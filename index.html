<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">

/* Keep the mobile sidebar/divider ending exactly at the top of chat bottom or sign-in bar */
function updateMobileBottomSpace(){
  try{
    var visibleBottom = null;
    var chatBottom = document.getElementById('chatBottom');
    var signIn = document.getElementById('signinOverlay');
    if (chatBottom && getComputedStyle(chatBottom).display !== 'none') visibleBottom = chatBottom;
    else if (signIn && getComputedStyle(signIn).display !== 'none') visibleBottom = signIn;
    var h = visibleBottom ? Math.ceil(visibleBottom.getBoundingClientRect().height) : 0;
    document.documentElement.style.setProperty('--chat-bottom-space', Math.max(h, 0) + 'px');
  } catch(e) {}
}
window.addEventListener('resize', updateMobileBottomSpace);
window.addEventListener('orientationchange', function(){ setTimeout(updateMobileBottomSpace, 250); });
setInterval(updateMobileBottomSpace, 700);
setTimeout(updateMobileBottomSpace, 50);
setTimeout(updateMobileBottomSpace, 500);

</script>

<style type="text/css">
/* ═══════════════════ BASE ═══════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;height:100dvh;
  overflow:hidden;
  font-family:'Plus Jakarta Sans','Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji','Segoe UI Symbol',sans-serif;
  font-size:13px;
  background:#252836;
  overscroll-behavior:none;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a3d52;border-radius:2px}
.chat-messages-container::-webkit-scrollbar{
  width:11px!important;
  background-color:rgba(128,128,128,.05)!important;
  border:none!important;
}
.chat-messages-container::-webkit-scrollbar-thumb{
  border-radius:8px!important;
  border:2px solid transparent!important;
  background-clip:content-box;
  background-color:rgba(128,128,128,.4)!important;
}

/* ═══════════════════ APP SHELL ═══════════════════ */
.app{
  display:flex;
  height:100dvh;
  width:100vw;
  background:#252836;
  position:relative;
  overflow:hidden;
}

/* ── CHAT PANEL ── */
.chat-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  background:#252836;
  min-width:0;
  position:relative;
  overflow:hidden;
  /* safe area padding for notch devices */
  padding-bottom:env(safe-area-inset-bottom,0px);
}

/* ═══════════════════ SIDEBAR ═══════════════════
   Desktop: slim fixed column
   Mobile:  slide-in drawer from right, no layout space taken
═══════════════════════════════════════════════ */
/* contacts divider */
.chat-contacts-divider{
  position:absolute;
  top:36px;
  bottom:68px;
  right:160px;
  width:2px;
  background:#0d0d0e;
  z-index:30;
  pointer-events:none;
}
@media (max-width:600px){
  .chat-contacts-divider{
    top:36px;
    bottom:68px;
    right:min(32vw,150px);
    width:2px;
    background:#0d0d0e;
  }
}
.sidebar{
  /* DESKTOP */
  width:160px;
  flex-shrink:0;
  background:#1d1f2e;
  display:flex;
  flex-direction:column;
  border-left:1px solid #252836;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}

/* MOBILE: fixed right column like the reference screenshot */
@media (max-width:600px){
  .app{
    display:grid;
    grid-template-columns:minmax(0,1fr) min(32vw,150px);
    height:100dvh;
    width:100vw;
    gap:0;
    padding-top:42px;
  }
  .chat-panel{
    grid-column:1;
    width:auto;
    min-width:0;
  }
  .sidebar{
    grid-column:2;
    position:relative;
    top:auto;right:auto;
    width:auto;
    height:calc(100dvh - 42px);
    z-index:1;
    transform:none!important;
    box-shadow:none;
    border-left:4px solid #141722;
    background:#252836;
  }
  .sidebar-backdrop{display:none!important}
}
@media (min-width:601px){
  .sidebar-backdrop{display:none!important}
}

.sidebar-list{flex:1;overflow-y:auto;padding:8px 0}
.presence-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;
}
.presence-avatar{
  width:28px;height:28px;border-radius:50%;
  background:#2f3247 center/cover no-repeat;
  flex-shrink:0;position:relative;
}
.presence-dot{
  position:static;
  width:7px;height:7px;border-radius:50%;
  background:#22c55e;
  border:none;
  flex-shrink:0;
  margin-left:auto;
}
.presence-name{font-size:12px;color:#a0a4bf;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.presence-name.anon{color:#5e6278;font-style:italic}

.sidebar-footer{
  padding:6px 10px 8px;
  border-top:1px solid #252836;
  flex-shrink:0;
  display:flex;align-items:center;gap:5px;
}
.online-count-txt{font-size:11px;color:#22c55e;font-weight:600}
@media (max-width:600px){
  .sidebar-list{padding:8px 0}
  .presence-item{gap:8px;padding:6px 9px}
  .presence-avatar{width:28px;height:28px}
  .presence-dot{width:7px;height:7px;background:#00d11f;margin-left:auto}
  .presence-name{font-size:13px;color:#e8e9f0;font-weight:500}
  .sidebar-footer{padding:0 9px 9px;border-top:0;min-height:32px;align-items:flex-end}
  .sidebar-footer svg{display:none}
  .online-count-txt{font-size:12px;color:#7bd51d;font-weight:700;line-height:1}
}

/* ═══════════════════ TOP BAR ═══════════════════ */
.chat-top{
  background:#0d0d0e;
  padding:0 12px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:42px;
  min-height:42px;
  /* safe area top */
  padding-top:env(safe-area-inset-top,0px);
  height:calc(42px + env(safe-area-inset-top,0px));
}
.chat-title{color:#fff;font-size:14px;font-weight:700}

/* sidebar toggle button — visible on mobile */
.sidebar-toggle{
  background:none;border:none;cursor:pointer;
  padding:5px;border-radius:5px;
  display:none; /* hidden on desktop */
  color:#8a8fac;
  align-items:center;justify-content:center;
}
@media (max-width:600px){
  .sidebar-toggle{display:none!important}
  .chat-top{
    position:fixed;top:0;left:0;right:0;z-index:40;
    height:42px;min-height:42px;padding:0 12px;
    width:100vw;
  }
  .chat-title{font-size:18px;font-weight:600;letter-spacing:.1px}
}

/* ═══════════════════ MESSAGES ═══════════════════ */
.chat-messages-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:4px 0;
  display:flex;flex-direction:column;
  background:#252836;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.chat-messages{display:flex;flex-direction:column;flex:1}
.message{
  color:#ffffff;
}
.message{
  position:relative;
  padding:2px 2px 6px 2px;
  color:#6c7982;
  line-height:1.4em;
}

/* message row */
.msg{
  display:flex;align-items:flex-start;gap:8px;
  padding:2px 2px 6px 2px;
  position:relative;
  color:#6c7982;
  line-height:1.4em;
}
.msg:hover{background:rgba(255,255,255,.025)}
/* action buttons reveal on hover (desktop) and on long-press indicator (mobile) */
.msg:hover .msg-actions{opacity:1;pointer-events:auto}
.msg.long-pressed .msg-actions{opacity:1;pointer-events:auto}

.msg-avatar{
  width:30px;height:30px;border-radius:50%;
  background:#2f3247 center/cover no-repeat;
  flex-shrink:0;margin-top:2px;
}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:5px;margin-bottom:1px;flex-wrap:wrap}
.msg-time{font-size:10px;color:#4e5268}
.msg-name{font-size:12px;font-weight:700;color:#8a8fac}
.msg-name-type{font-weight:400;color:#484c68;font-size:11px}
.msg-date-line{font-size:11px;color:#4c7d9f;line-height:1.28;margin-bottom:1px;font-weight:500}
.msg-content-line{font-size:13px;color:#ffffff;line-height:1.4;word-break:break-word;white-space:pre-wrap}
.msg-inline-name{font-weight:700;color:#ffffff}
.msg-inline-type{font-weight:500;color:#ffffff}
.msg-colon{color:#ffffff;margin:0 3px}
.msg-text{
  font-size:13px;color:#ffffff;line-height:1.4;
  word-break:break-word;white-space:pre-wrap;display:inline;
}
.msg-text a{color:#6e8efb;text-decoration:underline;text-underline-offset:2px}
.msg-text a:hover{color:#8da4ff;text-decoration:underline}

/* emoji / icon rendering support: keep normal digits/text, but allow emoji fallback */
.msg,.message,.msg-content-line,.msg-text,.chat-textarea,.signin-input,.presence-name{
  unicode-bidi: plaintext;
  font-family:'Plus Jakarta Sans',sans-serif,'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji','Segoe UI Symbol';
}
.msg-date-line,.msg-time,.video-time,.upload-progress-pct,.upload-progress-label,.online-count-txt,#mobileOnlineCount{
  font-variant-emoji: text;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* media */
.msg-media-wrap{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.msg-image{
  max-width:min(260px,70vw);max-height:200px;
  border-radius:8px;display:block;cursor:pointer;
  object-fit:cover;transition:opacity .2s;
  border:1px solid rgba(255,255,255,.08);background:#1a1c2a;
}
.msg-image:hover{opacity:.85}
.msg-image.loading{opacity:.3;filter:blur(3px)}

/* video player */
.video-player{
  width:min(380px,calc(100vw - 70px));max-width:380px;
  background:#0b0c12;border:1px solid rgba(255,255,255,.08);
  border-radius:10px;overflow:hidden;position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.22);
}
.video-player video{width:100%;max-height:220px;display:block;background:#000;outline:none}
.video-big-play{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:50px;height:50px;border-radius:50%;
  border:1px solid rgba(255,255,255,.2);background:rgba(13,13,14,.65);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:opacity .15s,transform .15s;
}
.video-big-play:hover{background:rgba(25,27,40,.85);transform:translate(-50%,-50%) scale(1.05)}
.video-player.playing .video-big-play{opacity:0;pointer-events:none}
.video-controls{
  display:grid;grid-template-columns:auto 1fr auto auto auto;
  gap:7px;align-items:center;padding:7px 9px;
  background:linear-gradient(180deg,rgba(18,20,30,.98),rgba(12,13,20,.98));
}
.video-control-btn{
  width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.08);
  background:#222536;color:#d8dbea;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.video-control-btn:hover{background:#2f3247;color:#fff}
.video-seek{width:100%;accent-color:#6e8efb;cursor:pointer;touch-action:manipulation}
.video-time{font-size:11px;color:#9aa0bd;white-space:nowrap;font-variant-numeric:tabular-nums}
.video-error{display:none;padding:7px 10px;background:#2a1518;color:#fca5a5;font-size:11px;border-top:1px solid rgba(255,255,255,.06)}
.video-player.video-failed .video-error{display:block}
.video-player.video-failed .video-big-play,.video-player.video-failed .video-controls{display:none}

.drive-video-player{
  width:min(460px,calc(100vw - 70px));aspect-ratio:16/9;
  border-radius:10px;overflow:hidden;background:#05060a;
  border:1px solid rgba(255,255,255,.10);box-shadow:0 8px 24px rgba(0,0,0,.28);
}
.drive-video-player iframe{width:100%;height:100%;border:0;display:block}
.drive-video-caption{color:#747a99;font-size:11px;margin-top:4px;word-break:break-word}
.social-embed-wrap{display:flex;flex-direction:column;gap:8px;margin-top:7px}
.social-embed-card{
  width:min(360px,calc(100vw - 78px));
  background:#11131d;border:1px solid rgba(255,255,255,.08);
  border-radius:10px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.22);
}
.social-embed-head{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;background:#181b29;color:#cfd3ea;font-size:11px;font-weight:700}
.social-embed-platform{display:flex;align-items:center;gap:6px}
.social-embed-platform:before{content:'';width:7px;height:7px;border-radius:50%;background:#6e8efb;display:inline-block}
.social-embed-note{font-size:10px;color:#6e7290;font-weight:500}
.social-embed-frame{width:100%;border:0;display:block;background:#000}
.social-embed-youtube{aspect-ratio:9/16;max-height:520px}
.social-embed-wide{aspect-ratio:16/9}
.social-embed-instagram{height:520px;aspect-ratio:9/16}
.social-embed-tiktok{height:560px}
.social-embed-facebook{height:520px}
.social-embed-fallback{padding:12px;color:#a0a4bf;font-size:12px;line-height:1.6;background:#151827}
.social-embed-fallback a{color:#8ea2ff;text-decoration:none}
@media (max-width:600px){
  .social-embed-card{width:min(340px,calc(68vw - 40px))}
  .social-embed-youtube{max-height:460px}
  .social-embed-instagram,.social-embed-tiktok,.social-embed-facebook{height:460px}
}

.msg-file-link{
  display:inline-flex;align-items:center;gap:8px;
  background:#2a2d3e;border-radius:8px;padding:8px 12px;
  color:#a0a4bf;font-size:12px;text-decoration:none;
  max-width:min(250px,70vw);border:1px solid rgba(255,255,255,.06);transition:background .15s;
}
.msg-file-link:hover{background:#333650;color:#e8e9f0}
.msg-file-icon{font-size:17px;flex-shrink:0}
.msg-file-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.msg-file-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
.msg-file-size{font-size:10px;color:#5e6278}

.msg-edited{font-size:10px;color:#a7abbf;margin-left:4px;font-style:italic}

/* action buttons */
.msg-actions{
  position:absolute;right:7px;top:50%;transform:translateY(-50%);
  display:flex;gap:2px;opacity:0;pointer-events:none;transition:opacity .15s;
  background:#1a1c2a;border-radius:6px;padding:3px 4px;z-index:5;
  border:1px solid #2a2d3e;
}
.msg-action-btn{
  background:none;border:none;color:#6e7290;cursor:pointer;
  padding:4px 6px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.msg-action-btn:hover{color:#fff;background:#2f3247}
.msg-action-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* inline edit */
.msg-edit-wrap{margin-top:3px}
.msg-edit-input{
  background:#2a2d3e;color:#e8e9f0;border:1px solid #4a4f68;border-radius:4px;
  padding:5px 8px;font-size:13px;font-family:inherit;width:100%;resize:none;outline:none;
}
.msg-edit-input:focus{border-color:#6e8efb}
.msg-edit-btns{display:flex;gap:5px;margin-top:3px}
.msg-edit-save,.msg-edit-cancel{
  font-size:11px;padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-family:inherit;
  touch-action:manipulation;
}
.msg-edit-save{background:#6e8efb;color:#fff}
.msg-edit-save:hover{background:#5a7af0}
.msg-edit-cancel{background:#2f3247;color:#a0a4bf}
.msg-edit-cancel:hover{background:#3a3d52}

/* ═══════════════════ BOTTOM ═══════════════════ */
.chat-bottom{
  flex-shrink:0;background:#0d0d0e;
  /* safe area bottom already on .chat-panel */
}
.chat-input-divider{background:#1a1c2a;height:1px}

/* upload preview */
.upload-preview-bar{display:none;flex-wrap:wrap;gap:6px;padding:6px 10px 0}
.preview-item{position:relative;display:inline-flex}
.preview-thumb{width:50px;height:50px;border-radius:6px;object-fit:cover;background:#2a2d3e}
.preview-file-chip{
  background:#2a2d3e;border-radius:6px;padding:5px 9px;
  font-size:11px;color:#a0a4bf;max-width:130px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.preview-remove{
  position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;
  background:#e53e3e;color:#fff;border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
  touch-action:manipulation;
}

/* upload progress */
.upload-progress-wrap{display:none;padding:5px 10px;background:#0d0d0e}
.upload-progress-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.upload-progress-label,.upload-progress-pct{font-size:11px;color:#a0a4bf}
.upload-progress-pct{color:#6e8efb;font-weight:600}
.upload-progress-bar{width:100%;height:3px;background:#2a2d3e;border-radius:2px;overflow:hidden}
.upload-progress-fill{height:100%;background:linear-gradient(90deg,#6e8efb,#a78bfa);border-radius:2px;transition:width .3s;width:0%}

/* attach bar */
.attach-bar{display:flex;align-items:center;padding:4px 8px 0;gap:1px}
.attach-btn{
  background:none;border:none;color:#5e6278;cursor:pointer;
  padding:5px 6px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,background .15s;touch-action:manipulation;
  min-width:34px;min-height:34px; /* touch target */
}
.attach-btn:hover{color:#a0a4bf;background:#2a2d3e}
.attach-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#fileInput{display:none}

/* typing bar */
.typing-bar{padding:1px 12px 2px;font-size:11px;color:#5e6278;min-height:16px}

/* input row */
.input-wrap{padding:5px 8px 7px;display:flex;align-items:flex-end;gap:6px}
.chat-textarea{
  flex:1;background:#252836;color:#e8e9f0;border:none;outline:none;
  border-radius:5px;padding:8px 10px;font-size:14px;font-family:inherit;
  resize:none;min-height:36px;max-height:100px;line-height:1.45;
  -webkit-appearance:none;touch-action:manipulation;
}
.chat-textarea::placeholder{color:#3e4260}
/* prevent iOS zoom on focus */
@supports (-webkit-touch-callout: none){
  .chat-textarea{font-size:16px}
  .signin-input{font-size:16px}
}

.send-btn{
  background:#6e8efb;color:#fff;border:none;border-radius:5px;
  padding:0 14px;width:auto;height:36px;min-width:58px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background .15s;
  touch-action:manipulation;font-family:inherit;font-size:13px;font-weight:500;
}
.send-btn:hover{background:#5a7af0}
.send-btn:disabled{background:#2f3247;color:#5e6278;cursor:default}
.logout-strip{
  height:18px;min-height:18px;
  display:flex;align-items:center;justify-content:flex-end;
  padding:0 10px 4px;
  background:#0d0d0e;
}
.logout-btn{
  width:20px;height:16px;border:none;background:transparent;
  color:#5e6278;cursor:pointer;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  padding:0;transition:color .15s,background .15s;
}
.logout-btn:hover{color:#e8e9f0;background:#1f2233}
.logout-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .send-btn{height:44px;min-width:62px;font-size:16px;border-radius:6px}

/* ═══════════════════ SIGNIN BAR AT MESSAGE INPUT PLACE ═══════════════════ */
.signin-overlay{
  position:static;
  background:#0d0d0e;
  z-index:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:7px 10px calc(7px + env(safe-area-inset-bottom,0px));

}
.signin-box{
  background:transparent;
  border-radius:0;
  padding:0;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:7px;
  width:100%;
  max-width:none;
  border:none;
}
.signin-title{display:none}
.signin-row{display:flex;gap:8px;width:100%;flex:1}

.signin-input:focus{border-color:#6e8efb;box-shadow:0 0 0 1px rgba(110,142,251,.35)}

}
.consent-accept:hover{background:#5a7af0}
@media (max-width:600px){

/* ═══════════════════ LIGHTBOX ═══════════════════ */
.lightbox{

/* ═══════════════════ TOAST ═══════════════════ */
.toast{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%) translateY(60px);
  background:#2f3247;color:#e8e9f0;padding:8px 16px;border-radius:6px;
  font-size:12px;z-index:300;transition:transform .25s,opacity .25s;
  opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw;
  overflow:hidden;text-overflow:ellipsis;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.error{background:#7f1d1d;color:#fca5a5}
.toast.success{background:#14532d;color:#86efac}

function postToAppsScriptWithProgress(payload, idx, total) {
  return new Promise(function(resolve, reject){
    try {

   SEND
═══════════════════════════════════════════════ */
document.getElementById('chatInput').addEventListener('keydown', function(e){
  /* mobile: Enter sends, Shift+Enter newline */
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('logoutBtn').addEventListener('click', logoutUser);
document.getElementById('chatInput').addEventListener('input', function(){ autoResize(this); handleTyping(); updateSendBtn(); });

function sendMessage(){
  if (!isSignedIn||isSending) return;
  var text  = document.getElementById('chatInput').value.trim();
  var files = pendingFiles.filter(function(f){ return f!=null; });
  if (!text&&!files.length) return;
  if (files.length>0&&!userConsented){ showToast('لم توافق على مشاركة الملفات','error'); return; }

  isSending = true;
  var btn = document.getElementById('sendBtn');
  btn.disabled=true;

  var savedText=text, savedFiles=files.slice();
  document.getElementById('chatInput').value='';
  autoResize(document.getElementById('chatInput'));
  clearUploadPreview(); stopTyping(); updateSendBtn();

  if (!savedFiles.length){ saveMsg(savedText,[]).finally(finishSend); return; }

  showUploadProgress(savedFiles.length);
  uploadFilesSequentially(savedFiles)
    .then(function(atts){ hideUploadProgress(); return saveMsg(savedText,atts); })
    .catch(function(e){ hideUploadProgress(); showToast(e.message==='script/not-configured'?'⚠️ ضع رابط Apps Script أولاً':'فشل الرفع: '+(e.message||''),'error'); })
    .finally(finishSend);

  function finishSend(){ isSending=false; btn.disabled=false; updateSendBtn(); }
}

function saveMsg(text,attachments){
  return db.collection('rooms').doc(ROOM_ID).collection('messages').add({
    text:text, attachments:attachments,
    name:currentUser.name, type:'Guest', deviceId:currentUser.deviceId,
    timestamp:firebase.firestore.FieldValue.serverTimestamp(), edited:false
  }).catch(function(){ showToast('فشل حفظ الرسالة','error'); });
}

/* ═══════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════ */
function subscribeMessages(){
  if(unsubMessages) unsubMessages();
  unsubMessages = db.collection('rooms').doc(ROOM_ID).collection('messages')
    .orderBy('timestamp','asc').limitToLast(MSGS_PER_PAGE)
    .onSnapshot(function(snap){
      snap.docChanges().forEach(function(ch){
        if(ch.type==='added')    renderMessage(ch.doc.id,ch.doc.data(),true);
        else if(ch.type==='modified') updateMsgEl(ch.doc.id,ch.doc.data());
        else if(ch.type==='removed')  removeMsgEl(ch.doc.id);
      });
    });
}

function renderMessage(id,data,scrollDown){
  if(document.getElementById('msg-'+id)) return;
  var el=buildMsgEl(id,data);
  var w=document.querySelector('.chat-welcome-message');
  if(w) document.getElementById('chatMessages').insertBefore(el,w);
  else  document.getElementById('chatMessages').appendChild(el);
  if(scrollDown) scrollToBottom();
}

function buildMsgEl(id,data){
  var isOwn = currentUser && data.deviceId===currentUser.deviceId;
  var ts    = data.timestamp?(data.timestamp.toDate?data.timestamp.toDate():new Date(data.timestamp)):new Date();
  var el    = document.createElement('div');
  el.className='msg message'; el.id='msg-'+id; el.dataset.id=id;

  /* long-press for mobile action reveal */
  var longPressTimer;
  el.addEventListener('touchstart', function(){ longPressTimer=setTimeout(function(){ el.classList.add('long-pressed'); },550); },{passive:true});
  el.addEventListener('touchend',   function(){ clearTimeout(longPressTimer); },{passive:true});
  el.addEventListener('touchmove',  function(){ clearTimeout(longPressTimer); },{passive:true});

  var mediaHtml='';
  var atts=data.attachments;
  if(atts&&Array.isArray(atts)&&atts.length){
    mediaHtml='<div class="msg-media-wrap">';
    atts.forEach(function(att){
      if(!att||!att.url) return;
      var t=att.type||detectFileType(att.mime,att.name);
      if(t==='image'){
        var imgUrls=getImageUrlCandidates(att);
        var first=imgUrls[0]||att.url||att.driveUrl||'';
        var enc=encodeURIComponent(JSON.stringify(imgUrls));
        mediaHtml+='<img class="msg-image loading" src="'+escHtml(first)+'" data-fallback-idx="0" data-fallbacks="'+escHtml(enc)+'" alt="'+escHtml(att.name||'صورة')+'" onload="this.classList.remove(\'loading\');this.style.opacity=\'1\'" onerror="handleImageError(this)" onclick="openLightbox(this.src)"/>';
      } else if(t==='video'){
        var fid=getAttachmentFileId(att);
        if(fid){
          mediaHtml+='<div class="drive-video-player"><iframe src="https://drive.google.com/file/d/'+encodeURIComponent(fid)+'/preview" allow="autoplay; fullscreen; encrypted-media" allowfullscreen loading="lazy"></iframe></div><div class="drive-video-caption">'+escHtml(att.name||'فيديو')+'</div>';
        } else {
          var vurls=getVideoUrlCandidates(att);
          var vfirst=vurls[0]||att.url||'';
          var venc=encodeURIComponent(JSON.stringify(vurls));
          var posterAttr=att.previewUrl?' poster="'+escHtml(att.previewUrl)+'"':'';
          mediaHtml+='<div class="video-player" data-fallback-idx="0" data-fallbacks="'+escHtml(venc)+'"><video preload="metadata" playsinline src="'+escHtml(vfirst)+'" type="'+escHtml(att.mime||'video/mp4')+'"'+posterAttr+' onloadedmetadata="updateVideoPlayer(this)" ontimeupdate="updateVideoPlayer(this)" onplay="setVideoPlayingState(this)" onpause="setVideoPlayingState(this)" onended="setVideoPlayingState(this)" onerror="handleVideoError(this)" onclick="toggleVideoPlayer(this.closest(\'&quot;.video-player&quot;\'))"></video><button class="video-big-play" onclick="toggleVideoPlayer(this.closest(\'.video-player\'))">▶</button><div class="video-controls"><button class="video-control-btn video-play-btn" onclick="toggleVideoPlayer(this.closest(\'.video-player\'))">▶</button><input class="video-seek" type="range" min="0" max="100" value="0" step="0.1" oninput="seekVideoPlayer(this)"><span class="video-time">0:00 / 0:00</span><button class="video-control-btn" onclick="toggleVideoMute(this)">🔊</button><button class="video-control-btn" onclick="fullscreenVideoPlayer(this)">⛶</button></div><div class="video-error"></div></div>';
        }
      } else if(t==='audio'){
        mediaHtml+='<audio controls preload="metadata" style="max-width:min(260px,70vw);margin-top:2px;"><source src="'+escHtml(att.url)+'" type="'+escHtml(att.mime||'audio/mpeg')+'"></audio>';
      } else {
        var icon=getFileIcon(att.name,att.mime);
        var size=att.size?formatFileSize(att.size):'';
        mediaHtml+='<a class="msg-file-link" href="'+escHtml(att.driveUrl||att.url)+'" target="_blank"><span class="msg-file-icon">'+icon+'</span><span class="msg-file-info"><span class="msg-file-name">'+escHtml(att.name||'ملف')+'</span>'+(size?'<span class="msg-file-size">'+size+'</span>':'')+  '</span></a>';
      }
    });
    mediaHtml+='</div>';
  }

  var editedBadge=data.edited?'<span class="msg-edited">(edited)</span>':'';
  var socialEmbedHtml = buildSocialEmbedsHtml(data.text||'');

  /* SVG icons for edit/delete */
  var actionsHtml=isOwn
    ? '<div class="msg-actions">'+
        '<button class="msg-action-btn" onclick="startEdit(\''+id+'\')" title="Edit">'+
          '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'+
        '</button>'+
        '<button class="msg-action-btn" onclick="deleteMsg(\''+id+'\')" title="Delete">'+
          '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>'+
        '</button>'+
      '</div>'
    : '';

  el.innerHTML=
    '<div class="msg-avatar" style="background-image:url(\''+DEFAULT_AVATAR+'\')"></div>'+
    '<div class="msg-body">'+
      '<div class="msg-date-line">'+escHtml(formatTime(ts))+'</div>'+
      '<div class="msg-content-line">'+
        '<span class="msg-inline-name">'+escHtml(data.name||'Unknown')+'</span> '+
        '<span class="msg-inline-type">('+escHtml(data.type||'Guest')+')</span>'+
        '<span class="msg-colon">:</span>'+
        '<span class="msg-text" id="txt-'+id+'" data-raw="'+escHtml(data.text||'')+'">'+linkify(escHtml(data.text||''))+'</span>'+editedBadge+
      '</div>'+
      socialEmbedHtml+
      mediaHtml+
    '</div>'+
    actionsHtml;
  return el;
}

function updateMsgEl(id,data){ var el=document.getElementById('msg-'+id); if(!el)return; el.parentNode.replaceChild(buildMsgEl(id,data),el); }
function removeMsgEl(id){ var el=document.getElementById('msg-'+id); if(el)el.remove(); }

/* edit / delete */
function startEdit(id){
  if(editingMsgId) cancelEdit(editingMsgId);
  editingMsgId=id;
  var txtEl=document.getElementById('txt-'+id); if(!txtEl)return;
  var raw=txtEl.dataset.raw||txtEl.textContent.replace(' (edited)','');
  txtEl.dataset.raw=raw;
  var wrap=document.createElement('div'); wrap.className='msg-edit-wrap'; wrap.id='edit-wrap-'+id;
  wrap.innerHTML='<textarea class="msg-edit-input" id="edit-inp-'+id+'" rows="2">'+escHtml(raw)+'</textarea><div class="msg-edit-btns"><button class="msg-edit-save" onclick="saveEdit(\''+id+'\')">Save</button><button class="msg-edit-cancel" onclick="cancelEdit(\''+id+'\')">Cancel</button></div>';
  txtEl.style.display='none';
  txtEl.parentNode.insertBefore(wrap,txtEl.nextSibling);
  var inp=document.getElementById('edit-inp-'+id);
  inp.focus(); inp.selectionStart=inp.selectionEnd=inp.value.length;
}
function saveEdit(id){
  var inp=document.getElementById('edit-inp-'+id); if(!inp)return;
  var t=inp.value.trim(); if(!t)return;
  db.collection('rooms').doc(ROOM_ID).collection('messages').doc(id)
    .update({text:t,edited:true,editedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){ editingMsgId=null; })
    .catch(function(){ showToast('فشل التعديل','error'); });
}
function cancelEdit(id){
  var wrap=document.getElementById('edit-wrap-'+id), txtEl=document.getElementById('txt-'+id);
  if(wrap)wrap.remove(); if(txtEl)txtEl.style.display=''; editingMsgId=null;
}
function deleteMsg(id){
  if(!confirm('Delete this message?')) return;
  db.collection('rooms').doc(ROOM_ID).collection('messages').doc(id).delete();
}

/* file preview */
function onAttachClick(){
  if(!userConsented){ showToast('لم توافق على مشاركة الملفات. أعد تحميل الصفحة لتغيير اختيارك.','error'); return; }
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change',function(){
  Array.from(this.files).forEach(addFilePreview); this.value='';
});
function addFilePreview(file){
  pendingFiles.push(file);
  var idx=pendingFiles.length-1;
  var bar=document.getElementById('uploadPreviewBar');
  bar.style.display='flex';
  var item=document.createElement('div'); item.className='preview-item';
  if(file.type.startsWith('image/')){
    var reader=new FileReader();
    reader.onload=function(e){ item.innerHTML='<img class="preview-thumb" src="'+e.target.result+'"/><button class="preview-remove" onclick="removePreview('+idx+',this.parentNode)">✕</button>'; };
    reader.readAsDataURL(file);
  } else {
    item.innerHTML='<div class="preview-file-chip">'+getFileIcon(file.name,file.type)+' '+escHtml(file.name)+'</div><button class="preview-remove" onclick="removePreview('+idx+',this.parentNode)">✕</button>';
  }
  bar.appendChild(item); updateSendBtn();
}
function removePreview(idx,el){
  pendingFiles[idx]=null; el.remove();
  if(!document.getElementById('uploadPreviewBar').children.length) document.getElementById('uploadPreviewBar').style.display='none';
  updateSendBtn();
}
function clearUploadPreview(){ pendingFiles=[]; var bar=document.getElementById('uploadPreviewBar'); bar.innerHTML=''; bar.style.display='none'; }

/* progress */
function showUploadProgress(total){ document.getElementById('uploadProgressWrap').style.display='block'; document.getElementById('uploadProgressLabel').textContent='جاري رفع '+total+' ملف...'; document.getElementById('uploadProgressPct').textContent='0%'; document.getElementById('uploadProgressFill').style.width='0%'; }
function setProgressPct(pct,n,total){ var s=Math.min(Math.max(Math.round(pct),0),100); document.getElementById('uploadProgressFill').style.width=s+'%'; document.getElementById('uploadProgressPct').textContent=s+'%'; document.getElementById('uploadProgressLabel').textContent='ملف '+n+' من '+total; }
function hideUploadProgress(){ document.getElementById('uploadProgressWrap').style.display='none'; document.getElementById('uploadProgressFill').style.width='0%'; }

/* ═══════════════════════════════════════════════
   PRESENCE
═══════════════════════════════════════════════ */
function registerAnonymousPresence(){
  getDeviceId().then(function(devId){
    var ref=rtdb.ref('presence/'+ROOM_ID+'/'+devId);
    ref.set({name:null,isViewer:true,online:true,ts:Date.now()});
    ref.onDisconnect().remove(); listenPresence();
  });
}
function registerNamedPresence(name,devId){
  var ref=rtdb.ref('presence/'+ROOM_ID+'/'+devId);
  ref.set({name:name,isViewer:false,online:true,ts:Date.now()});
  ref.onDisconnect().remove(); listenPresence();
}
function listenPresence(){
  rtdb.ref('presence/'+ROOM_ID).on('value',function(snap){ renderPresence(snap.val()||{}); });
}
function renderPresence(all){
  var entries=Object.values(all);
  var count=entries.length;
  document.getElementById('onlineCountEl').textContent=count+' online';
  document.getElementById('mobileOnlineCount').textContent=count;
  var list=document.getElementById('presenceList'); list.innerHTML='';
  entries.forEach(function(p){
    var el=document.createElement('div'); el.className='presence-item';
    var label=p.name||(p.isViewer?'viewer':'anonymous');
    el.innerHTML='<div class="presence-avatar" style="background-image:url(\''+DEFAULT_AVATAR+'\')"></div><div class="presence-name '+(p.name?'':'anon')+'">'+escHtml(label)+'</div><div class="presence-dot" title="Online"></div>';
    list.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════
   TYPING
═══════════════════════════════════════════════ */
function handleTyping(){
  if(!isSignedIn||!currentUser)return;
  var ref=rtdb.ref('typing/'+ROOM_ID+'/'+currentUser.deviceId);
  ref.set({name:currentUser.name,ts:Date.now()}); ref.onDisconnect().remove();
  clearTimeout(typingTimer); typingTimer=setTimeout(function(){ ref.remove(); },3000);
}
function stopTyping(){
  if(!isSignedIn||!currentUser)return;
  rtdb.ref('typing/'+ROOM_ID+'/'+currentUser.deviceId).remove();
  clearTimeout(typingTimer);
}
rtdb.ref('typing/'+ROOM_ID).on('value',function(snap){
  var all=snap.val()||{}, devId=currentUser?currentUser.deviceId:null;
  var others=Object.entries(all).filter(function(e){ return e[0]!==devId; }).map(function(e){ return e[1].name; });
  document.getElementById('typingBar').textContent=others.length?others.join(', ')+(others.length===1?' is typing…':' are typing…'):'';
});

/* ═══════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════ */
function openLightbox(url){
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click',function(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src='';
});
document.getElementById('lightbox').addEventListener('click',function(e){
  if(e.target===this){ this.classList.remove('open'); document.getElementById('lightboxImg').src=''; }
});

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function scrollToBottom(){ var w=document.getElementById('messagesWrap'); setTimeout(function(){ w.scrollTop=w.scrollHeight; },60); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function updateSendBtn(){
  if(isSending)return;
  var hasText=document.getElementById('chatInput').value.trim().length>0;
  var hasFiles=pendingFiles.some(function(f){ return f!=null; });
  document.getElementById('sendBtn').disabled=!(hasText||hasFiles);
}
function formatTime(d){ return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function escHtml(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function linkify(text){ return text.replace(/(https?:\/\/[^\s<>"]+)/g,'<a target="_blank" rel="nofollow" href="$1">$1</a>'); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||''); t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },3500); }

/* keyboard on mobile — scroll chat up when keyboard opens */
if ('visualViewport' in window) {
  window.visualViewport.addEventListener('resize', function(){
    var bottom = document.getElementById('chatBottom');
    if (!bottom || bottom.style.display==='none') return;
    scrollToBottom();
  });
}


/* Keep the mobile sidebar/divider ending exactly at the top of chat bottom or sign-in bar */
function updateMobileBottomSpace(){
  try{
    var visibleBottom = null;
    var chatBottom = document.getElementById('chatBottom');
    var signIn = document.getElementById('signinOverlay');
    if (chatBottom && getComputedStyle(chatBottom).display !== 'none') visibleBottom = chatBottom;
    else if (signIn && getComputedStyle(signIn).display !== 'none') visibleBottom = signIn;
    var h = visibleBottom ? Math.ceil(visibleBottom.getBoundingClientRect().height) : 0;
    document.documentElement.style.setProperty('--chat-bottom-space', Math.max(h, 0) + 'px');
  } catch(e) {}
}
window.addEventListener('resize', updateMobileBottomSpace);
window.addEventListener('orientationchange', function(){ setTimeout(updateMobileBottomSpace, 250); });
setInterval(updateMobileBottomSpace, 700);
setTimeout(updateMobileBottomSpace, 50);
setTimeout(updateMobileBottomSpace, 500);

</script>
