<style type="text/css">
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px}
body{background:#252836}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a3d52;border-radius:2px}

.app{display:flex;height:100vh;width:100vw;background:#252836;}

.chat-panel{
  flex:1;display:flex;flex-direction:column;
  background:#252836;min-width:0;position:relative;overflow:hidden;
}

.sidebar{
  width:200px;flex-shrink:0;background:#1d1f2e;
  display:flex;flex-direction:column;border-left:1px solid #252836;
}

.chat-top{
  background:#0d0d0e;padding:10px 14px;flex-shrink:0;
  display:flex;align-items:center;min-height:40px;
}
.chat-title{color:#fff;font-size:14px;font-weight:700;}

.chat-messages-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:4px 0 4px;display:flex;flex-direction:column;background:#252836;
}
.chat-messages{display:flex;flex-direction:column;flex:1;}

.msg{
  display:flex;align-items:flex-start;gap:9px;
  padding:3px 12px;position:relative;cursor:default;
}
.msg:hover{background:rgba(255,255,255,.025)}
.msg:hover .msg-actions{opacity:1;pointer-events:auto}

.msg-avatar{
  width:32px;height:32px;border-radius:50%;
  background:#2f3247 center/cover no-repeat;flex-shrink:0;margin-top:1px;
}

.msg-body{flex:1;min-width:0}

.msg-meta{
  display:flex;align-items:baseline;gap:5px;
  margin-bottom:1px;flex-wrap:wrap;
}
.msg-time{font-size:10px;color:#4e5268}
.msg-name{font-size:12px;font-weight:700;color:#8a8fac}
.msg-name-type{font-weight:400;color:#484c68;font-size:11px}

.msg-text{
  font-size:13px;color:#e8e9f0;line-height:1.5;
  word-break:break-word;white-space:pre-wrap;display:inline;
}
.msg-text a{color:#6e8efb;text-decoration:none}
.msg-text a:hover{text-decoration:underline}

/* ── FIX: صور المحادثة ── */
.msg-image{
  max-width:260px;
  max-height:200px;
  border-radius:8px;
  margin-top:6px;
  display:block;           /* ← مهم جداً: block وليس inline */
  cursor:pointer;
  object-fit:cover;
  transition:opacity .2s;
  border:1px solid rgba(255,255,255,0.08);
  background:#1a1c2a;      /* placeholder بينما تحمّل الصورة */
}
.msg-image:hover{opacity:.88}
.msg-image.loading{opacity:0.4}

.msg-media-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-top:4px;
}

.msg-video{max-width:260px;border-radius:8px;margin-top:4px;display:block}
.msg-file-link{
  display:inline-flex;align-items:center;gap:6px;
  background:#2a2d3e;border-radius:6px;padding:6px 10px;
  margin-top:4px;color:#a0a4bf;font-size:12px;text-decoration:none;
  max-width:220px;
}
.msg-file-link:hover{background:#333650}

.msg-edited{font-size:10px;color:#484c68;margin-left:4px;font-style:italic}

.msg-actions{
  position:absolute;right:8px;top:50%;
  transform:translateY(-50%);
  display:flex;gap:2px;
  opacity:0;pointer-events:none;
  transition:opacity .15s;
  background:#1a1c2a;border-radius:5px;padding:2px 4px;
  z-index:5;
}
.msg-action-btn{
  background:none;border:none;color:#6e7290;
  cursor:pointer;padding:3px 5px;border-radius:4px;
  font-size:11px;line-height:1;
}
.msg-action-btn:hover{color:#fff;background:#2f3247}

.msg-edit-wrap{margin-top:3px}
.msg-edit-input{
  background:#2a2d3e;color:#e8e9f0;border:1px solid #4a4f68;border-radius:4px;
  padding:4px 8px;font-size:13px;font-family:inherit;width:100%;resize:none;outline:none;
}
.msg-edit-input:focus{border-color:#6e8efb}
.msg-edit-btns{display:flex;gap:5px;margin-top:3px}
.msg-edit-save,.msg-edit-cancel{
  font-size:11px;padding:3px 9px;border-radius:4px;border:none;cursor:pointer;font-family:inherit;
}
.msg-edit-save{background:#6e8efb;color:#fff}
.msg-edit-save:hover{background:#5a7af0}
.msg-edit-cancel{background:#2f3247;color:#a0a4bf}
.msg-edit-cancel:hover{background:#3a3d52}

.chat-bottom{flex-shrink:0;background:#0d0d0e;}
.chat-input-divider{background:#0d0d0e;height:1px}

.upload-preview-bar{display:none;flex-wrap:wrap;gap:6px;padding:5px 10px 0;}
.preview-item{position:relative;display:inline-flex}
.preview-thumb{width:52px;height:52px;border-radius:5px;object-fit:cover;background:#2a2d3e;}
.preview-file-chip{
  background:#2a2d3e;border-radius:5px;padding:4px 8px;
  font-size:11px;color:#a0a4bf;max-width:140px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.preview-remove{
  position:absolute;top:-5px;right:-5px;
  width:16px;height:16px;border-radius:50%;
  background:#e53e3e;color:#fff;border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}

/* ── شريط رفع الملف مع progress ── */
.attach-bar{display:flex;align-items:center;padding:5px 10px 0;gap:2px;}
.attach-btn{
  background:none;border:none;color:#5e6278;cursor:pointer;
  padding:3px 5px;border-radius:4px;font-size:15px;line-height:1;
  transition:color .15s,background .15s;
}
.attach-btn:hover{color:#a0a4bf;background:#2a2d3e}
#fileInput{display:none}

/* ── Upload progress bar ── */
.upload-progress-wrap{
  display:none;
  padding:4px 10px;
  background:#0d0d0e;
}
.upload-progress-label{font-size:11px;color:#a0a4bf;margin-bottom:3px;}
.upload-progress-bar{
  width:100%;height:4px;background:#2a2d3e;border-radius:2px;overflow:hidden;
}
.upload-progress-fill{
  height:100%;background:#6e8efb;border-radius:2px;
  transition:width .2s;width:0%;
}

.typing-bar{padding:1px 12px 2px;font-size:11px;color:#5e6278;min-height:16px;}

.input-wrap{padding:6px 10px 8px;display:flex;align-items:flex-end;gap:6px;}
.chat-textarea{
  flex:1;background:#252836;color:#e8e9f0;border:none;outline:none;
  border-radius:5px;padding:8px 10px;font-size:13px;font-family:inherit;
  resize:none;min-height:36px;max-height:100px;line-height:1.45;
}
.chat-textarea::placeholder{color:#3e4260}

.send-btn{
  background:#6e8efb;color:#fff;border:none;border-radius:5px;
  padding:7px 14px;font-size:13px;font-family:inherit;
  cursor:pointer;flex-shrink:0;transition:background .15s;
}
.send-btn:hover{background:#5a7af0}
.send-btn:disabled{background:#2f3247;color:#5e6278;cursor:default}

.signin-overlay{
  position:absolute;inset:0;background:rgba(13,13,14,.0);
  z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;padding-bottom:24px;
}
.signin-box{
  background:#1a1c2a;border-radius:6px;padding:14px 20px;
  display:flex;flex-direction:column;align-items:center;gap:10px;min-width:260px;
}
.signin-title{color:#9fa3be;font-size:13px;font-weight:600;letter-spacing:.2px;}
.signin-row{display:flex;gap:8px;width:100%}
.signin-input{
  flex:1;background:#252836;color:#e8e9f0;border:1px solid #3a3d52;border-radius:4px;
  padding:7px 10px;font-size:13px;font-family:inherit;outline:none;
}
.signin-input:focus{border-color:#6e8efb}
.signin-input::placeholder{color:#3e4260}
.signin-submit{
  background:#6e8efb;color:#fff;border:none;border-radius:4px;padding:7px 16px;
  font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;white-space:nowrap;transition:background .15s;
}
.signin-submit:hover{background:#5a7af0}
.signin-submit:disabled{background:#2f3247;color:#5e6278;cursor:default}

.sidebar-list{flex:1;overflow-y:auto;padding:8px 0;}
.presence-item{display:flex;align-items:center;gap:9px;padding:6px 12px;}
.presence-avatar{
  width:28px;height:28px;border-radius:50%;
  background:#2f3247 center/cover no-repeat;flex-shrink:0;position:relative;
}
.presence-dot{
  position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;
  background:#22c55e;border:1.5px solid #1d1f2e;
}
.presence-name{font-size:12px;color:#a0a4bf;font-weight:500}
.presence-name.anon{color:#5e6278;font-style:italic}

.sidebar-footer{padding:6px 12px 8px;border-top:1px solid #252836;flex-shrink:0;}
.online-count-txt{font-size:11px;color:#22c55e;font-weight:600}

.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.lightbox.open{display:flex}
.lightbox img{
  max-width:90vw;max-height:90vh;border-radius:6px;
  box-shadow:0 16px 64px rgba(0,0,0,.7);
}
.lightbox-close{
  position:absolute;top:14px;right:18px;background:none;border:none;
  color:#fff;font-size:24px;cursor:pointer;opacity:.8;
}
.lightbox-close:hover{opacity:1}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#2f3247;color:#e8e9f0;padding:8px 18px;border-radius:5px;
  font-size:12px;z-index:300;transition:transform .25s,opacity .25s;opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.error{background:#7f1d1d;color:#fca5a5;}
.toast.success{background:#14532d;color:#86efac;}
</style>
</head>
<body>

<div class="app">

  <div class="chat-panel">
    <div class="chat-top">
      <div class="chat-title" id="chatTitle">Google</div>
    </div>

    <div class="chat-messages-wrap" id="messagesWrap">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-welcome-message" style="color:#0d0d0e;font-size:0"></div>
      </div>
    </div>

    <div class="typing-bar" id="typingBar"></div>

    <div class="chat-bottom" id="chatBottom" style="display:none">
      <div class="chat-input-divider"></div>
      <div class="attach-bar">
        <button class="attach-btn" title="إرفاق صورة/فيديو/ملف"
                onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" multiple
               accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip,.rar"/>
      </div>
      <div class="upload-preview-bar" id="uploadPreviewBar"></div>

      <!-- ✅ إضافة: شريط تقدم الرفع -->
      <div class="upload-progress-wrap" id="uploadProgressWrap">
        <div class="upload-progress-label" id="uploadProgressLabel">جاري رفع الصور...</div>
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="uploadProgressFill"></div>
        </div>
      </div>

      <div class="input-wrap">
        <textarea class="chat-textarea" id="chatInput"
                  placeholder="Type a message and press enter"
                  rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>Send</button>
      </div>
    </div>

    <div class="signin-overlay" id="signinOverlay">
      <div class="signin-box">
        <div class="signin-title">Sign in as a Guest</div>
        <div class="signin-row">
          <input class="signin-input" id="nameInput" type="text"
                 placeholder="Your name" maxlength="30" autocomplete="off"/>
          <button class="signin-submit" id="signinBtn">Sign in</button>
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-list" id="presenceList"></div>
    <div class="sidebar-footer">
      <div class="online-count-txt" id="onlineCountEl">0 online</div>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div class="toast" id="toast"></div>


<script type="text/javascript">
/* ═══════════════════════════════════════════════════════
   FIREBASE CONFIG
═══════════════════════════════════════════════════════ */
var firebaseConfig = {
  apiKey           : "AIzaSyD0unPjbthUtdiUAwNzp2Z8NeMNAW3a6hM",
  authDomain       : "haider-portfolio-26965.firebaseapp.com",
  databaseURL      : "https://haider-portfolio-26965-default-rtdb.firebaseio.com",
  projectId        : "haider-portfolio-26965",
  storageBucket    : "haider-portfolio-26965.firebasestorage.app",
  messagingSenderId: "569224854609",
  appId            : "1:569224854609:web:714fa7d027467c7a5dcc70"
};

firebase.initializeApp(firebaseConfig);

var db      = firebase.firestore();
var storage = firebase.storage();
var rtdb    = firebase.database();
var auth    = firebase.auth();

var ROOM_ID = 'google-chat';
var MSGS_PER_PAGE = 50;

var currentUser   = null;
var isSignedIn    = false;
var pendingFiles  = [];
var editingMsgId  = null;
var typingTimer   = null;
var unsubMessages = null;
var isSending     = false; // ✅ منع الإرسال المزدوج

var DEFAULT_AVATAR = 'https://d167qii8h0pw75.cloudfront.net/images/D/E/F/DEFAULTUSER-resize_38x38.png';

/* ═══════════════════════════════════════════════════════
   DEVICE FINGERPRINT
═══════════════════════════════════════════════════════ */
function getDeviceId() {
  var saved = localStorage.getItem('__chatDeviceId');
  if (saved) return Promise.resolve(saved);

  try {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Plus Jakarta Sans';
    ctx.fillStyle = '#f60';
    ctx.fillRect(125,1,62,20);
    ctx.fillStyle = '#069';
    ctx.fillText('fp🔐', 2, 2);
    var raw = canvas.toDataURL() +
              navigator.userAgent + navigator.language +
              screen.width + screen.height +
              (Intl.DateTimeFormat().resolvedOptions().timeZone || '');
    var encoder = new TextEncoder();
    return crypto.subtle.digest('SHA-256', encoder.encode(raw))
      .then(function(buf) {
        var arr = Array.from(new Uint8Array(buf));
        var id  = 'dev_' + arr.map(function(b){return b.toString(36)}).join('').substr(0,18);
        localStorage.setItem('__chatDeviceId', id);
        return id;
      });
  } catch(e) {
    var id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).substr(2,6);
    localStorage.setItem('__chatDeviceId', id);
    return Promise.resolve(id);
  }
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(function init() {
  var savedName = localStorage.getItem('__chatUserName');
  if (!savedName) {
    registerAnonymousPresence();
    return;
  }
  getDeviceId().then(function(devId) {
    autoSignIn(savedName, devId);
  });
})();

function autoSignIn(name, devId) {
  currentUser = { name: name, deviceId: devId };
  isSignedIn  = true;
  document.getElementById('signinOverlay').style.display = 'none';
  document.getElementById('chatBottom').style.display    = 'block';
  registerNamedPresence(name, devId);
  subscribeMessages();
  document.getElementById('chatInput').focus();
}

/* ═══════════════════════════════════════════════════════
   SIGN IN
═══════════════════════════════════════════════════════ */
document.getElementById('signinBtn').addEventListener('click', doSignIn);
document.getElementById('nameInput').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doSignIn();
});

function doSignIn() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }

  var btn = document.getElementById('signinBtn');
  btn.disabled = true;
  btn.textContent = '...';

  getDeviceId().then(function(devId) {
    return db.collection('users').doc(devId).get()
      .then(function(snap) {
        var p = snap.exists
          ? db.collection('users').doc(devId).update({ name: name, lastSeen: firebase.firestore.FieldValue.serverTimestamp() })
          : db.collection('users').doc(devId).set({ name: name, deviceId: devId, created: firebase.firestore.FieldValue.serverTimestamp(), lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
        return p.then(function(){ return devId; });
      });
  })
  .then(function(devId) {
    var authP = auth.currentUser
      ? Promise.resolve(auth.currentUser)
      : auth.signInAnonymously().then(function(r){ return r.user; });
    return authP.then(function(){ return devId; });
  })
  .then(function(devId) {
    localStorage.setItem('__chatUserName', name);
    autoSignIn(name, devId);
  })
  .catch(function(e) {
    console.error('Sign in error', e);
    showToast('حدث خطأ، حاول مرة أخرى', 'error');
    btn.disabled = false;
    btn.textContent = 'Sign in';
  });
}

/* ═══════════════════════════════════════════════════════
   PRESENCE
═══════════════════════════════════════════════════════ */
function registerAnonymousPresence() {
  getDeviceId().then(function(devId) {
    var ref = rtdb.ref('presence/' + ROOM_ID + '/' + devId);
    ref.set({ name: null, isViewer: true, online: true, ts: Date.now() });
    ref.onDisconnect().remove();
    listenPresence();
  });
}

function registerNamedPresence(name, devId) {
  var ref = rtdb.ref('presence/' + ROOM_ID + '/' + devId);
  ref.set({ name: name, isViewer: false, online: true, ts: Date.now() });
  ref.onDisconnect().remove();
  listenPresence();
}

function listenPresence() {
  rtdb.ref('presence/' + ROOM_ID).on('value', function(snap) {
    renderPresence(snap.val() || {});
  });
}

function renderPresence(all) {
  var entries = Object.values(all);
  document.getElementById('onlineCountEl').textContent = entries.length + ' online';
  var list = document.getElementById('presenceList');
  list.innerHTML = '';
  entries.forEach(function(p) {
    var el = document.createElement('div');
    el.className = 'presence-item';
    var label = p.name || (p.isViewer ? 'viewer' : 'anonymous');
    var cls   = p.name ? '' : 'anon';
    el.innerHTML =
      '<div class="presence-avatar" style="background-image:url(\'' + DEFAULT_AVATAR + '\')">' +
        '<div class="presence-dot"></div>' +
      '</div>' +
      '<div class="presence-name ' + cls + '">' + escHtml(label) + '</div>';
    list.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   MESSAGES — Firestore
═══════════════════════════════════════════════════════ */
function subscribeMessages() {
  if (unsubMessages) unsubMessages();

  unsubMessages = db.collection('rooms').doc(ROOM_ID)
    .collection('messages')
    .orderBy('timestamp', 'asc')
    .limitToLast(MSGS_PER_PAGE)
    .onSnapshot(function(snap) {
      snap.docChanges().forEach(function(change) {
        if      (change.type === 'added')    renderMessage(change.doc.id, change.doc.data(), true);
        else if (change.type === 'modified') updateMsgEl(change.doc.id, change.doc.data());
        else if (change.type === 'removed')  removeMsgEl(change.doc.id);
      });
    }, function(err){ console.error('Messages listener error:', err); });
}

/* ═══════════════════════════════════════════════════════
   ✅ RENDER MESSAGE — الإصلاح الرئيسي هنا
═══════════════════════════════════════════════════════ */
function renderMessage(id, data, scrollDown) {
  if (document.getElementById('msg-' + id)) return;
  var el = buildMsgEl(id, data);
  var welcome = document.querySelector('.chat-welcome-message');
  if (welcome) document.getElementById('chatMessages').insertBefore(el, welcome);
  else          document.getElementById('chatMessages').appendChild(el);
  if (scrollDown) scrollToBottom();
}

function buildMsgEl(id, data) {
  var isOwn = currentUser && data.deviceId === currentUser.deviceId;
  var ts    = data.timestamp ? (data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp)) : new Date();
  var timeStr = formatTime(ts);

  var el = document.createElement('div');
  el.className = 'msg';
  el.id = 'msg-' + id;
  el.dataset.id = id;

  /* ✅ الإصلاح: بناء وسائط بشكل صحيح */
  var mediaHtml = '';
  var attachments = data.attachments;

  // ✅ التحقق الصحيح من وجود المرفقات
  if (attachments && Array.isArray(attachments) && attachments.length > 0) {
    mediaHtml = '<div class="msg-media-wrap">';
    attachments.forEach(function(att, idx) {
      if (!att || !att.url) {
        console.warn('Attachment missing URL:', att);
        return;
      }

      var attType = att.type || detectTypeFromUrl(att.url, att.name);

      if (attType === 'image') {
        // ✅ img مع onload/onerror للتشخيص
        mediaHtml += '<img class="msg-image loading" ' +
          'src="' + escHtml(att.url) + '" ' +
          'alt="صورة" ' +
          'onload="this.classList.remove(\'loading\')" ' +
          'onerror="this.style.display=\'none\';console.error(\'Image failed:\',this.src)" ' +
          'onclick="openLightbox(\'' + escHtml(att.url) + '\')" />';
      } else if (attType === 'video') {
        mediaHtml += '<video class="msg-video" src="' + escHtml(att.url) + '" controls></video>';
      } else {
        var icon = getFileIcon(att.name || '');
        mediaHtml += '<a class="msg-file-link" href="' + escHtml(att.url) + '" target="_blank" download>' +
                     icon + ' ' + escHtml(att.name || 'ملف') + '</a>';
      }
    });
    mediaHtml += '</div>';
  }

  var editedBadge = data.edited ? '<span class="msg-edited">(edited)</span>' : '';

  var actionsHtml = '';
  if (isOwn) {
    actionsHtml =
      '<div class="msg-actions">' +
        '<button class="msg-action-btn" title="Edit" onclick="startEdit(\'' + id + '\')">✏️</button>' +
        '<button class="msg-action-btn" title="Delete" onclick="deleteMsg(\'' + id + '\')">🗑️</button>' +
      '</div>';
  }

  el.innerHTML =
    '<div class="msg-avatar" style="background-image:url(\'' + DEFAULT_AVATAR + '\')"></div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' +
        '<span class="msg-time">' + escHtml(timeStr) + '</span>' +
        '<span class="msg-name">' + escHtml(data.name || 'Unknown') +
          '<span class="msg-name-type"> (' + escHtml(data.type || 'Guest') + ')</span>' +
        '</span>' +
      '</div>' +
      '<span class="msg-text" id="txt-' + id + '">' +
        linkify(escHtml(data.text || '')) + editedBadge +
      '</span>' +
      mediaHtml +
    '</div>' +
    actionsHtml;

  return el;
}

/* ✅ كشف نوع الملف من URL أو الاسم كـ fallback */
function detectTypeFromUrl(url, name) {
  var str = (name || url || '').toLowerCase();
  if (/\.(jpg|jpeg|png|gif|webp|svg|bmp|ico|tiff?)(\?|$)/i.test(str)) return 'image';
  if (/\.(mp4|webm|ogg|mov|avi|mkv)(\?|$)/i.test(str)) return 'video';
  return 'file';
}

function getFileIcon(name) {
  var ext = (name.split('.').pop() || '').toLowerCase();
  var icons = { pdf:'📄', doc:'📝', docx:'📝', txt:'📃', zip:'🗜️', rar:'🗜️' };
  return icons[ext] || '📎';
}

function updateMsgEl(id, data) {
  var el = document.getElementById('msg-' + id);
  if (!el) return;
  var newEl = buildMsgEl(id, data);
  el.parentNode.replaceChild(newEl, el);
}

function removeMsgEl(id) {
  var el = document.getElementById('msg-' + id);
  if (el) el.remove();
}

/* ═══════════════════════════════════════════════════════
   ✅ SEND MESSAGE — مع progress وتشخيص واضح
═══════════════════════════════════════════════════════ */
document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('input', function() {
  autoResize(this);
  handleTyping();
  updateSendBtn();
});

function sendMessage() {
  if (!isSignedIn || isSending) return;
  var text  = document.getElementById('chatInput').value.trim();
  var files = pendingFiles.filter(function(f){ return f != null; });
  if (!text && !files.length) return;

  isSending = true;
  var btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '...';

  var savedText  = text;
  var savedFiles = files.slice();

  document.getElementById('chatInput').value = '';
  autoResize(document.getElementById('chatInput'));
  clearUploadPreview();
  stopTyping();
  updateSendBtn();

  // ── بدون ملفات: أرسل مباشرة ──
  if (savedFiles.length === 0) {
    saveMessageToFirestore(savedText, [])
      .finally(function() {
        isSending = false;
        btn.disabled = false;
        btn.textContent = 'Send';
        updateSendBtn();
      });
    return;
  }

  // ── مع ملفات: ارفع أولاً ──
  showUploadProgress(savedFiles.length);

  uploadFilesSequentially(savedFiles)
    .then(function(attachments) {
      hideUploadProgress();
      return saveMessageToFirestore(savedText, attachments);
    })
    .catch(function(e) {
      hideUploadProgress();
      console.error('Send error:', e);
      if (e.code === 'storage/unauthorized') {
        showToast('⚠️ صلاحيات Firebase Storage غير مضبوطة — راجع Security Rules', 'error');
      } else if (e.code === 'storage/quota-exceeded') {
        showToast('⚠️ تجاوزت حصة التخزين المجانية', 'error');
      } else {
        showToast('فشل الرفع: ' + (e.message || e.code || 'خطأ غير معروف'), 'error');
      }
    })
    .finally(function() {
      isSending = false;
      btn.disabled = false;
      btn.textContent = 'Send';
      updateSendBtn();
    });
}

/* رفع الملفات واحداً تلو الآخر مع تحديث progress دقيق */
function uploadFilesSequentially(files) {
  var results   = [];
  var totalSize = files.reduce(function(s, f){ return s + f.size; }, 0);
  var doneSize  = 0;

  function uploadOne(i) {
    if (i >= files.length) return Promise.resolve(results);

    var file     = files[i];
    var safeName = file.name.replace(/[^a-zA-Z0-9._\-]/g, '_');
    var path     = 'rooms/' + ROOM_ID + '/' + Date.now() + '_' + i + '_' + safeName;
    var ref      = storage.ref(path);

    console.log('[Upload] Starting:', file.name, '| size:', file.size, '| type:', file.type);

    return new Promise(function(resolve, reject) {
      var task = ref.put(file);

      task.on('state_changed',
        /* progress */ function(snap) {
          var fileDone    = snap.bytesTransferred;
          var fileTotal   = snap.totalBytes || file.size;
          var overallPct  = Math.round(((doneSize + fileDone) / Math.max(totalSize, 1)) * 100);
          setProgressPct(overallPct, i + 1, files.length);
        },
        /* error */ function(err) {
          console.error('[Upload] Failed:', file.name, err.code, err.message);
          reject(err);
        },
        /* success */ function() {
          doneSize += file.size;
          task.snapshot.ref.getDownloadURL()
            .then(function(url) {
              console.log('[Upload] Done:', file.name, '→', url);

              var fileType = file.type.startsWith('image/') ? 'image'
                           : file.type.startsWith('video/') ? 'video'
                           : 'file';

              results.push({ url: url, type: fileType, name: file.name, size: file.size, mime: file.type });
              resolve();
            })
            .catch(reject);
        }
      );
    }).then(function() {
      return uploadOne(i + 1); // الملف التالي
    });
  }

  return uploadOne(0);
}

/* حفظ الرسالة في Firestore */
function saveMessageToFirestore(text, attachments) {
  console.log('[Firestore] Saving message | attachments:', attachments.length);
  return db.collection('rooms').doc(ROOM_ID).collection('messages').add({
    text       : text,
    attachments: attachments,
    name       : currentUser.name,
    type       : 'Guest',
    deviceId   : currentUser.deviceId,
    timestamp  : firebase.firestore.FieldValue.serverTimestamp(),
    edited     : false
  }).then(function(ref) {
    console.log('[Firestore] Saved:', ref.id);
  }).catch(function(e) {
    console.error('[Firestore] Save failed:', e);
    showToast('فشل حفظ الرسالة: ' + (e.message || e.code), 'error');
  });
}

/* ── Upload progress helpers ── */
function showUploadProgress(total) {
  var wrap = document.getElementById('uploadProgressWrap');
  wrap.style.display = 'block';
  document.getElementById('uploadProgressLabel').textContent = 'جاري رفع ' + total + ' ملف... 0%';
  document.getElementById('uploadProgressFill').style.width = '0%';
}

function setProgressPct(pct, fileNum, total) {
  var safe = Math.min(Math.max(pct, 0), 100);
  document.getElementById('uploadProgressFill').style.width = safe + '%';
  document.getElementById('uploadProgressLabel').textContent =
    'ملف ' + fileNum + ' من ' + total + ' — ' + safe + '%';
}

function hideUploadProgress() {
  document.getElementById('uploadProgressWrap').style.display = 'none';
  document.getElementById('uploadProgressFill').style.width = '0%';
}

/* ═══════════════════════════════════════════════════════
   EDIT MESSAGE
═══════════════════════════════════════════════════════ */
function startEdit(id) {
  if (editingMsgId) cancelEdit(editingMsgId);
  editingMsgId = id;
  var txtEl = document.getElementById('txt-' + id);
  if (!txtEl) return;
  var raw = txtEl.dataset.raw || txtEl.textContent.replace(' (edited)', '');
  txtEl.dataset.raw = raw;
  var wrap = document.createElement('div');
  wrap.className = 'msg-edit-wrap';
  wrap.id = 'edit-wrap-' + id;
  wrap.innerHTML =
    '<textarea class="msg-edit-input" id="edit-inp-' + id + '" rows="2">' + escHtml(raw) + '</textarea>' +
    '<div class="msg-edit-btns">' +
      '<button class="msg-edit-save"   onclick="saveEdit(\'' + id + '\')">Save</button>' +
      '<button class="msg-edit-cancel" onclick="cancelEdit(\'' + id + '\')">Cancel</button>' +
    '</div>';
  txtEl.style.display = 'none';
  txtEl.parentNode.insertBefore(wrap, txtEl.nextSibling);
  var inp = document.getElementById('edit-inp-' + id);
  inp.focus();
  inp.selectionStart = inp.selectionEnd = inp.value.length;
}

function saveEdit(id) {
  var inp = document.getElementById('edit-inp-' + id);
  if (!inp) return;
  var newText = inp.value.trim();
  if (!newText) return;
  db.collection('rooms').doc(ROOM_ID).collection('messages').doc(id).update({
    text: newText, edited: true,
    editedAt: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(function(){ editingMsgId = null; })
  .catch(function(e){ console.error('Edit error', e); showToast('فشل التعديل', 'error'); });
}

function cancelEdit(id) {
  var wrap  = document.getElementById('edit-wrap-' + id);
  var txtEl = document.getElementById('txt-' + id);
  if (wrap)  wrap.remove();
  if (txtEl) txtEl.style.display = '';
  editingMsgId = null;
}

/* ═══════════════════════════════════════════════════════
   DELETE MESSAGE
═══════════════════════════════════════════════════════ */
function deleteMsg(id) {
  if (!confirm('Delete this message?')) return;
  db.collection('rooms').doc(ROOM_ID).collection('messages').doc(id).delete()
    .catch(function(e){ console.error('Delete error', e); });
}

/* ═══════════════════════════════════════════════════════
   FILE UPLOAD — Preview
═══════════════════════════════════════════════════════ */
document.getElementById('fileInput').addEventListener('change', function() {
  Array.from(this.files).forEach(addFilePreview);
  this.value = '';
});

function addFilePreview(file) {
  pendingFiles.push(file);
  var idx = pendingFiles.length - 1;
  var bar = document.getElementById('uploadPreviewBar');
  bar.style.display = 'flex';
  var item = document.createElement('div');
  item.className = 'preview-item';

  if (file.type.startsWith('image/')) {
    var reader = new FileReader();
    reader.onload = function(e) {
      item.innerHTML =
        '<img class="preview-thumb" src="' + e.target.result + '"/>' +
        '<button class="preview-remove" onclick="removePreview(' + idx + ',this.parentNode)">✕</button>';
    };
    reader.readAsDataURL(file);
  } else {
    item.innerHTML =
      '<div class="preview-file-chip">' + getFileIcon(file.name) + ' ' + escHtml(file.name) + '</div>' +
      '<button class="preview-remove" onclick="removePreview(' + idx + ',this.parentNode)">✕</button>';
  }
  bar.appendChild(item);
  updateSendBtn();
}

function removePreview(idx, el) {
  pendingFiles[idx] = null;
  el.remove();
  if (!document.getElementById('uploadPreviewBar').children.length) {
    document.getElementById('uploadPreviewBar').style.display = 'none';
  }
  updateSendBtn();
}

function clearUploadPreview() {
  pendingFiles = [];
  var bar = document.getElementById('uploadPreviewBar');
  bar.innerHTML = '';
  bar.style.display = 'none';
}

/* ═══════════════════════════════════════════════════════
   TYPING
═══════════════════════════════════════════════════════ */
function handleTyping() {
  if (!isSignedIn || !currentUser) return;
  var ref = rtdb.ref('typing/' + ROOM_ID + '/' + currentUser.deviceId);
  ref.set({ name: currentUser.name, ts: Date.now() });
  ref.onDisconnect().remove();
  clearTimeout(typingTimer);
  typingTimer = setTimeout(function(){ ref.remove(); }, 3000);
}

function stopTyping() {
  if (!isSignedIn || !currentUser) return;
  rtdb.ref('typing/' + ROOM_ID + '/' + currentUser.deviceId).remove();
  clearTimeout(typingTimer);
}

rtdb.ref('typing/' + ROOM_ID).on('value', function(snap) {
  var all    = snap.val() || {};
  var devId  = currentUser ? currentUser.deviceId : null;
  var others = Object.entries(all)
    .filter(function(e){ return e[0] !== devId; })
    .map(function(e){ return e[1].name; });
  document.getElementById('typingBar').textContent =
    others.length ? others.join(', ') + (others.length === 1 ? ' is typing…' : ' are typing…') : '';
});

/* ═══════════════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════════════ */
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', function(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
});
document.getElementById('lightbox').addEventListener('click', function(e){
  if (e.target === this) {
    this.classList.remove('open');
    document.getElementById('lightboxImg').src = '';
  }
});

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function scrollToBottom() {
  var w = document.getElementById('messagesWrap');
  setTimeout(function(){ w.scrollTop = w.scrollHeight; }, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function updateSendBtn() {
  if (isSending) return;
  var hasText  = document.getElementById('chatInput').value.trim().length > 0;
  var hasFiles = pendingFiles.some(function(f){ return f != null; });
  document.getElementById('sendBtn').disabled = !(hasText || hasFiles);
}

function formatTime(d) {
  return d.toLocaleString('en-US', {
    month:'short', day:'numeric',
    hour:'numeric', minute:'2-digit', hour12:true
  });
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<>"]+)/g,
    '<a target="_blank" rel="nofollow" href="$1">$1</a>');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}
