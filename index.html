/* Keep the mobile sidebar/divider ending exactly at the top of chat bottom or sign-in bar */
function updateMobileBottomSpace(){
  try{
    var visibleBottom = null;
    var chatBottom = document.getElementById('chatBottom');
    var signIn = document.getElementById('signinOverlay');
    if (chatBottom && getComputedStyle(chatBottom).display !== 'none') visibleBottom = chatBottom;
    else if (signIn && getComputedStyle(signIn).display !== 'none') visibleBottom = signIn;
    var h = visibleBottom ? Math.ceil(visibleBottom.getBoundingClientRect().height) : 0;
    document.documentElement.style.setProperty('--chat-bottom-space', Math.max(h, 0) + 'px');
  } catch(e) {}
}
window.addEventListener('resize', updateMobileBottomSpace);
window.addEventListener('orientationchange', function(){ setTimeout(updateMobileBottomSpace, 250); });
setInterval(updateMobileBottomSpace, 700);
setTimeout(updateMobileBottomSpace, 50);
setTimeout(updateMobileBottomSpace, 500);

</script>

function getDeviceId() {
  var saved = localStorage.getItem('__chatDeviceId');
  if (saved) return Promise.resolve(saved);
  try {
    var canvas = document.createElement('canvas');
    var ctx    = canvas.getContext('2d');
    ctx.textBaseline = 'top'; ctx.font = '14px Plus Jakarta Sans';
    ctx.fillStyle = '#f60'; ctx.fillRect(125,1,62,20);
    ctx.fillStyle = '#069'; ctx.fillText('fp', 2, 2);
    var raw = canvas.toDataURL() + navigator.userAgent + screen.width + screen.height;
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw)).then(function(buf){
      var id = 'dev_' + Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(36); }).join('').substr(0,18);
      localStorage.setItem('__chatDeviceId', id);
      return id;
    });
  } catch(e) {
    var id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).substr(2,6);
    localStorage.setItem('__chatDeviceId', id);
    return Promise.resolve(id);
  }
}

function uploadViaAppsScript(file, idx, total) {

        data:base64,
        size:file.size

        var directUrl = 'https://drive.google.com/uc?export=view&id='+encodeURIComponent(fileId);
        setProgressPct(Math.round(((idx+1)/total)*100), idx+1, total);
        return previewPromise.then(function(previewUrl){
          resolve({ url:proxyUrl, previewUrl:previewUrl, thumbnailUrl:thumbnailUrl, directUrl:directUrl, driveUrl:driveUrl, fileId:fileId, type:fileType, name:file.name, size:file.size, mime:file.type });
        });
      })
      .catch(reject);
    };
    reader.onprogress = function(ev){
      if (ev && ev.lengthComputable) {
        var readPct = Math.round((ev.loaded / ev.total) * 25);
        setProgressPct(readPct, idx+1, total);
      }

function postToAppsScriptWithProgress(payload, idx, total) {
  // Google Apps Script often returns HTTP 0 with XMLHttpRequest upload progress

      setProgressPct(fakePct, idx+1, total);
    },450);
  }
  function stopSoftProgress(){
    if(progressTimer){ clearInterval(progressTimer); progressTimer=null; }
  }

  startSoftProgress();
  return fetch(APPS_SCRIPT_URL, {
    method:'POST',
    body:JSON.stringify(payload),
    redirect:'follow'
  })
  .then(function(res){
    stopSoftProgress();
    if(!res.ok) throw new Error('HTTP '+res.status);
    setProgressPct(98, idx+1, total);
    return res.text();
  })

    try { return JSON.parse(txt || '{}'); }
    catch(e) { throw new Error('Invalid Apps Script JSON response'); }
  })
  .catch(function(err){
    stopSoftProgress();
    if(err && (err.message==='Failed to fetch' || err.message==='NetworkError when attempting to fetch resource.')){

function createMediaPreviewDataUrl(file) {
  if (!file||!file.type) return Promise.resolve(null);

  if (t.startsWith('video/')) return createVideoPosterDataUrl(file);
  return Promise.resolve(null);
}
function createImagePreviewDataUrl(file) {
  return new Promise(function(resolve){
    try {
      if (!file.type.toLowerCase().startsWith('image/')) { resolve(null); return; }
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function(){
        try {
          var maxSide=420, w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
          if (!w||!h){ URL.revokeObjectURL(url); resolve(null); return; }
          var scale=Math.min(1,maxSide/Math.max(w,h));
          var canvas=document.createElement('canvas');
          canvas.width=Math.max(1,Math.round(w*scale)); canvas.height=Math.max(1,Math.round(h*scale));

    } catch(e){ resolve(null); }
  });

function createVideoPosterDataUrl(file) {
  return new Promise(function(resolve){
    try {

        try {
          var w=video.videoWidth, h=video.videoHeight;
          if(!w||!h){ finish(null); return; }
          var scale=Math.min(1,520/Math.max(w,h));
          var canvas=document.createElement('canvas');
          canvas.width=Math.max(1,Math.round(w*scale)); canvas.height=Math.max(1,Math.round(h*scale));
          canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
          finish(canvas.toDataURL('image/jpeg',0.52));

function detectFileType(mime,name){

}

}
function getTikTokId(url){
  try{ var m=String(url).match(/\/video\/(\d+)/); return m?m[1]:''; }catch(e){ return ''; }
}
function getInstagramCode(url){
  try{ var m=String(url).match(/instagram\.com\/(?:reel|p|tv)\/([^\/?#]+)/i); return m?m[1]:''; }catch(e){ return ''; }
}
function isFacebookVideoUrl(url){ return /facebook\.com|fb\.watch/i.test(url) && /(reel|watch|videos|fb\.watch)/i.test(url); }

function getYouTubeEmbedSrc(id){
  var src='https://www.youtube-nocookie.com/embed/'+encodeURIComponent(id)+'?playsinline=1&rel=0&modestbranding=1';
  try {
    if (location && location.origin && /^https?:/.test(location.origin)) {
      src += '&origin=' + encodeURIComponent(location.origin);
    }
  } catch(e) {}
  return src;
}
function getSocialEmbeds(text){
  var urls=getUrlsFromText(text), embeds=[];
  urls.forEach(function(url){
    var h=getHost(url), yt=getYouTubeId(url), tk=getTikTokId(url), ig=getInstagramCode(url);
    if(yt){
      var isShort = /\/shorts\//i.test(url);
      embeds.push({platform:isShort?'YouTube Shorts':'YouTube', type:'youtube', url:url, src:getYouTubeEmbedSrc(yt), cls:isShort?'social-embed-youtube':'social-embed-wide'});
    } else if(tk){
      embeds.push({platform:'TikTok', type:'tiktok', url:url, src:'https://www.tiktok.com/embed/v2/'+encodeURIComponent(tk), cls:'social-embed-tiktok'});
    } else if(ig){
      embeds.push({platform:'Instagram', type:'instagram', url:url, src:'https://www.instagram.com/reel/'+encodeURIComponent(ig)+'/embed', cls:'social-embed-instagram'});
    } else if(isFacebookVideoUrl(url)){
      embeds.push({platform:'Facebook', type:'facebook', url:url, src:'https://www.facebook.com/plugins/video.php?href='+encodeURIComponent(url)+'&show_text=false&width=360', cls:'social-embed-facebook'});
    }
  });
  return embeds;
}
function buildSocialEmbedsHtml(text){
  var embeds=getSocialEmbeds(text);
  if(!embeds.length) return '';
  var html='<div class="social-embed-wrap">';
  embeds.forEach(function(e){
    html+='<div class="social-embed-card">'+
      '<div class="social-embed-head"><span class="social-embed-platform">'+escHtml(e.platform)+'</span><span class="social-embed-note">Preview</span></div>'+
      '<iframe class="social-embed-frame '+escHtml(e.cls)+'" src="'+escHtml(e.src)+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen" allowfullscreen loading="lazy"></iframe>'+
      '<div class="social-embed-fallback">إذا منعت المنصة التشغيل داخل الصفحة، سيبقى الرابط ظاهرًا في الرسالة.</div>'+
    '</div>';
  });
  html+='</div>';
  return html;
}
function getImageUrlCandidates(att){
  var urls=[];
  if(att.previewUrl) urls.push(att.previewUrl);
  if(att.url) urls.push(att.url);
  if(att.thumbnailUrl) urls.push(att.thumbnailUrl);
  if(att.fileId){
    urls.push('https://drive.google.com/thumbnail?id='+encodeURIComponent(att.fileId)+'&sz=w1200');
    urls.push('https://drive.google.com/uc?export=view&id='+encodeURIComponent(att.fileId));
    urls.push('https://lh3.googleusercontent.com/d/'+encodeURIComponent(att.fileId));
  }
  if(att.directUrl) urls.push(att.directUrl);
  if(att.driveUrl)  urls.push(att.driveUrl);
  return uniqueUrls(urls);
}
function handleImageError(img){
  var urls=[]; try{ urls=JSON.parse(decodeURIComponent(img.getAttribute('data-fallbacks')||'%5B%5D')); }catch(e){}
  var next=parseInt(img.getAttribute('data-fallback-idx')||'0',10)+1;
  if(next<urls.length){ img.setAttribute('data-fallback-idx',String(next)); img.src=urls[next]; return; }
  img.classList.remove('loading'); img.style.opacity='0.25'; img.title='تعذر عرض الصورة';
}
function getVideoUrlCandidates(att){
  var urls=[];
  if(att.url) urls.push(att.url);
  if(att.directUrl) urls.push(att.directUrl);
  if(att.fileId){
    urls.push('https://drive.google.com/uc?export=download&id='+encodeURIComponent(att.fileId));
    urls.push('https://drive.google.com/uc?export=view&id='+encodeURIComponent(att.fileId));
  }
  return uniqueUrls(urls);
}
function formatVideoTime(s){ s=Math.max(0,Math.floor(s||0)); var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); return m+':'+String(sec).padStart(2,'0'); }
function getVideoPlayer(el){ return el&&el.closest?el.closest('.video-player'):null; }
function updateVideoPlayer(video){ var p=getVideoPlayer(video); if(!p)return; var r=p.querySelector('.video-seek'),t=p.querySelector('.video-time'),d=video.duration; if(r&&isFinite(d)&&d>0&&!r.dataset.dragging)r.value=String((video.currentTime/d)*100); if(t)t.textContent=formatVideoTime(video.currentTime)+' / '+(isFinite(d)?formatVideoTime(d):'0:00'); }
function setVideoPlayingState(video){ var p=getVideoPlayer(video); if(!p)return; var btn=p.querySelector('.video-play-btn'); if(video.paused||video.ended){ p.classList.remove('playing'); if(btn)btn.textContent='▶'; }else{ p.classList.add('playing'); if(btn)btn.textContent='⏸'; } }
function toggleVideoPlayer(player){ if(!player)return; var v=player.querySelector('video'); if(!v)return; v.paused||v.ended?v.play().catch(function(){showToast('تعذر تشغيل الفيديو','error');}):v.pause(); }
function seekVideoPlayer(range){ var p=getVideoPlayer(range); if(!p)return; var v=p.querySelector('video'); if(!v||!isFinite(v.duration)||v.duration<=0)return; v.currentTime=(Number(range.value)/100)*v.duration; updateVideoPlayer(v); }
function toggleVideoMute(btn){ var p=getVideoPlayer(btn); if(!p)return; var v=p.querySelector('video'); if(!v)return; v.muted=!v.muted; btn.textContent=v.muted?'🔇':'🔊'; }
function fullscreenVideoPlayer(btn){ var p=getVideoPlayer(btn); if(!p)return; document.fullscreenElement?document.exitFullscreen():(p.requestFullscreen&&p.requestFullscreen()); }
function handleVideoError(video){ var p=getVideoPlayer(video); if(!p)return; var urls=[]; try{urls=JSON.parse(decodeURIComponent(p.getAttribute('data-fallbacks')||'%5B%5D'));}catch(e){} var next=parseInt(p.getAttribute('data-fallback-idx')||'0',10)+1; if(next<urls.length){ p.setAttribute('data-fallback-idx',String(next)); video.src=urls[next]; video.load(); return; } p.classList.add('video-failed'); var err=p.querySelector('.video-error'); if(err)err.textContent='تعذر تشغيل الفيديو داخل المحادثة.'; }
function uploadFilesSequentially(files){ var results=[]; function next(i){ if(i>=files.length)return Promise.resolve(results); return uploadViaAppsScript(files[i],i,files.length).then(function(a){ results.push(a); return next(i+1); }); } return next(0); }

document.getElementById('chatInput').addEventListener('keydown', function(e){
  /* mobile: Enter sends, Shift+Enter newline */
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function sendMessage(){
  if (!isSignedIn||isSending) return;
  var text  = normalizeEmojiPresentation(document.getElementById('chatInput').value.trim());
  var files = pendingFiles.filter(function(f){ return f!=null; });
  if (!text&&!files.length) return;
  if (files.length>0&&!userConsented){ showToast('لم توافق على مشاركة الملفات','error'); return; }

  isSending = true;
  var btn = document.getElementById('sendBtn');
  if (btn) btn.disabled=true;

  var savedText=text, savedFiles=files.slice();
  document.getElementById('chatInput').value='';
  autoResize(document.getElementById('chatInput'));
  clearUploadPreview(); stopTyping(); updateSendBtn();

  if (!savedFiles.length){ saveMsg(savedText,[]).finally(finishSend); return; }

  showUploadProgress(savedFiles.length);
  uploadFilesSequentially(savedFiles)
    .then(function(atts){ hideUploadProgress(); return saveMsg(savedText,atts); })
    .catch(function(e){ hideUploadProgress(); showToast(e.message==='script/not-configured'?'⚠️ ضع رابط Apps Script أولاً':'فشل الرفع: '+(e.message||''),'error'); })
    .finally(finishSend);

  function finishSend(){ isSending=false; if (btn) btn.disabled=false; updateSendBtn(); }
}

function saveMsg(text,attachments){
  return db.collection('rooms').doc(ROOM_ID).collection('messages').add({
    text:text, attachments:attachments,
    name:currentUser.name, type:'Guest', deviceId:currentUser.deviceId,
    timestamp:firebase.firestore.FieldValue.serverTimestamp(), edited:false
  }).catch(function(){ showToast('فشل حفظ الرسالة','error'); });
}

function subscribeMessages(){
  if(unsubMessages) unsubMessages();
  unsubMessages = db.collection('rooms').doc(ROOM_ID).collection('messages')
    .orderBy('timestamp','asc').limitToLast(MSGS_PER_PAGE)
    .onSnapshot(function(snap){
      snap.docChanges().forEach(function(ch){
        if(ch.type==='added')    renderMessage(ch.doc.id,ch.doc.data(),true);
        else if(ch.type==='modified') updateMsgEl(ch.doc.id,ch.doc.data());
        else if(ch.type==='removed')  removeMsgEl(ch.doc.id);
      });
    });
}

function renderMessage(id,data,scrollDown){
  if(document.getElementById('msg-'+id)) return;

  if(w) document.getElementById('chatMessages').insertBefore(el,w);

        }
      } else if(t==='audio'){

      } else {
        var icon=getFileIcon(att.name,att.mime);
        var size=att.size?formatFileSize(att.size):'';
        mediaHtml+='<a class="msg-file-link" href="'+escHtml(att.driveUrl||att.url)+'" target="_blank"><span class="msg-file-icon">'+icon+'</span><span class="msg-file-info"><span class="msg-file-name">'+escHtml(att.name||'ملف')+'</span>'+(size?'<span class="msg-file-size">'+size+'</span>':'')+  '</span></a>';

function updateMsgEl(id,data){ var el=document.getElementById('msg-'+id); if(!el)return; el.parentNode.replaceChild(buildMsgEl(id,data),el); }

/* edit / delete */
function startEdit(id){
  if(editingMsgId) cancelEdit(editingMsgId);
  editingMsgId=id;
  var txtEl=document.getElementById('txt-'+id); if(!txtEl)return;
  var raw=txtEl.dataset.raw||txtEl.textContent.replace(' (edited)','');
  txtEl.dataset.raw=raw;
  var wrap=document.createElement('div'); wrap.className='msg-edit-wrap'; wrap.id='edit-wrap-'+id;
  wrap.innerHTML='<textarea class="msg-edit-input" id="edit-inp-'+id+'" rows="2">'+escHtml(raw)+'</textarea><div class="msg-edit-btns"><button class="msg-edit-save" onclick="saveEdit(\''+id+'\')">Save</button><button class="msg-edit-cancel" onclick="cancelEdit(\''+id+'\')">Cancel</button></div>';
  txtEl.style.display='none';
  txtEl.parentNode.insertBefore(wrap,txtEl.nextSibling);
  var inp=document.getElementById('edit-inp-'+id);
  inp.focus(); inp.selectionStart=inp.selectionEnd=inp.value.length;
}
function saveEdit(id){
  var inp=document.getElementById('edit-inp-'+id); if(!inp)return;
  var t=inp.value.trim(); if(!t)return;
  db.collection('rooms').doc(ROOM_ID).collection('messages').doc(id)
    .update({text:t,edited:true,editedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){ editingMsgId=null; })
    .catch(function(){ showToast('فشل التعديل','error'); });
}
function cancelEdit(id){
  var wrap=document.getElementById('edit-wrap-'+id), txtEl=document.getElementById('txt-'+id);
  if(wrap)wrap.remove(); if(txtEl)txtEl.style.display=''; editingMsgId=null;
}
function deleteMsg(id){
  if(!confirm('Delete this message?')) return;
  db.collection('rooms').doc(ROOM_ID).collection('messages').doc(id).delete();
}

function listenPresence(){
  rtdb.ref('presence/'+ROOM_ID).on('value',function(snap){ renderPresence(snap.val()||{}); });

function renderPresence(all){
  var entries=Object.values(all||{});
  var count=entries.length;
  var viewerCount=entries.filter(function(p){ return !p.name && p.isViewer; }).length;
  var namedEntries=entries.filter(function(p){ return p.name; });
  var anonymousEntries=entries.filter(function(p){ return !p.name && !p.isViewer; });
  var onlineEl = document.getElementById('onlineCountEl');
  if (onlineEl) onlineEl.textContent=count+' online';
  var mobileEl = document.getElementById('mobileOnlineCount');
  if (mobileEl) mobileEl.textContent=count;
  var list=document.getElementById('presenceList');
  if (!list) return;
  list.innerHTML='';
  function addContact(label, extraClass){
    var el=document.createElement('div');
    el.className='contact-list-item presence-item '+(extraClass||'');
    el.innerHTML='<div class="contact-list-profile-image profile-tiny-image presence-avatar" style="background-image:url(\''+DEFAULT_AVATAR+'\')"></div>'+ '<div class="contact-list-profile-name presence-name '+(extraClass||'')+'">'+escHtml(label)+'</div>'+ '<div class="contact-list-status-icon status-icon status-icon-1 presence-dot" title="Online"></div>';
    list.appendChild(el);
  }
  namedEntries.forEach(function(p){ addContact(p.name, ''); });
  if(viewerCount>0) addContact(viewerCount+' Viewer','viewer-count');
  anonymousEntries.forEach(function(){ addContact('anonymous','contact-list-item-inactive anon'); });
}

function handleTyping(){
  if(!isSignedIn||!currentUser)return;
  var ref=rtdb.ref('typing/'+ROOM_ID+'/'+currentUser.deviceId);
  ref.set({name:currentUser.name,ts:Date.now()}); ref.onDisconnect().remove();
  clearTimeout(typingTimer); typingTimer=setTimeout(function(){ ref.remove(); },3000);
}
function stopTyping(){
  if(!isSignedIn||!currentUser)return;
  rtdb.ref('typing/'+ROOM_ID+'/'+currentUser.deviceId).remove();
  clearTimeout(typingTimer);
}
rtdb.ref('typing/'+ROOM_ID).on('value',function(snap){
  var all=snap.val()||{}, devId=currentUser?currentUser.deviceId:null;
  var others=Object.entries(all)
    .filter(function(e){ return e[0]!==devId; })
    .map(function(e){ return e[1] && e[1].name ? e[1].name : ''; })
    .filter(Boolean);

  var bar = document.getElementById('typingBar');
  if (!bar) return;

  if (!others.length) {
    bar.innerHTML = '';
    return;
  }

  var namesHtml = others.map(function(name){
    return '<span class="typing-name">' + escHtml(name) + '</span>';
  }).join('<span class="typing-separator">، </span>');

  bar.innerHTML = namesHtml + ' <span class="typing-status-word">يكتب...</span>';
});

/* ═══════════════════════════════════════════════
   LIGHTBOX + IMAGE ZOOM / PAN / PINCH
═══════════════════════════════════════════════ */
var lightboxState = { scale:1, x:0, y:0, dragging:false, lastX:0, lastY:0, pinchStartDist:0, pinchStartScale:1 };
function clamp(n,min,max){ return Math.min(Math.max(n,min),max); }
function updateLightboxTransform(){
  var img=document.getElementById('lightboxImg');
  var level=document.getElementById('lightboxZoomLevel');
  if(!img) return;
  lightboxState.scale=clamp(lightboxState.scale,1,5);
  if(lightboxState.scale<=1.001){ lightboxState.scale=1; lightboxState.x=0; lightboxState.y=0; }
  img.style.transform='translate3d('+lightboxState.x+'px,'+lightboxState.y+'px,0) scale('+lightboxState.scale+')';
  if(level) level.textContent=Math.round(lightboxState.scale*100)+'%';
}
function resetLightboxZoom(){
  lightboxState.scale=1; lightboxState.x=0; lightboxState.y=0;
  updateLightboxTransform();
}
function zoomLightbox(delta, cx, cy){
  var oldScale=lightboxState.scale;
  var nextScale=clamp(oldScale+delta,1,5);
  if(nextScale===oldScale) return;
  // Approximate zoom toward pointer/center for a natural feel
  if(cx!=null && cy!=null){
    var vw=window.innerWidth/2, vh=window.innerHeight/2;
    lightboxState.x -= (cx-vw) * (nextScale-oldScale) / Math.max(nextScale,1);
    lightboxState.y -= (cy-vh) * (nextScale-oldScale) / Math.max(nextScale,1);
  }
  lightboxState.scale=nextScale;
  updateLightboxTransform();
}
function closeLightbox(){
  var lb=document.getElementById('lightbox');
  var img=document.getElementById('lightboxImg');
  if(lb) lb.classList.remove('open');
  if(img) img.src='';
  resetLightboxZoom();
}
function openLightbox(url){
  resetLightboxZoom();
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxZoomIn').addEventListener('click',function(){ zoomLightbox(.35); });
document.getElementById('lightboxZoomOut').addEventListener('click',function(){ zoomLightbox(-.35); });
document.getElementById('lightboxZoomReset').addEventListener('click', resetLightboxZoom);
document.getElementById('lightbox').addEventListener('click',function(e){
  if(e.target===this){ closeLightbox(); }
});
document.getElementById('lightboxViewport').addEventListener('wheel',function(e){
  e.preventDefault();
  zoomLightbox(e.deltaY<0?.25:-.25,e.clientX,e.clientY);
},{passive:false});
document.getElementById('lightboxViewport').addEventListener('mousedown',function(e){
  if(lightboxState.scale<=1) return;
  lightboxState.dragging=true; lightboxState.lastX=e.clientX; lightboxState.lastY=e.clientY;
  this.classList.add('dragging');
});
window.addEventListener('mousemove',function(e){
  if(!lightboxState.dragging) return;
  lightboxState.x += e.clientX-lightboxState.lastX;
  lightboxState.y += e.clientY-lightboxState.lastY;
  lightboxState.lastX=e.clientX; lightboxState.lastY=e.clientY;
  updateLightboxTransform();
});
window.addEventListener('mouseup',function(){
  lightboxState.dragging=false;
  var vp=document.getElementById('lightboxViewport'); if(vp) vp.classList.remove('dragging');
});
function touchDistance(t1,t2){ var dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY; return Math.sqrt(dx*dx+dy*dy); }
document.getElementById('lightboxViewport').addEventListener('touchstart',function(e){
  if(e.touches.length===1){
    lightboxState.dragging=lightboxState.scale>1;
    lightboxState.lastX=e.touches[0].clientX; lightboxState.lastY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    lightboxState.dragging=false;
    lightboxState.pinchStartDist=touchDistance(e.touches[0],e.touches[1]);
    lightboxState.pinchStartScale=lightboxState.scale;
  }
},{passive:false});
document.getElementById('lightboxViewport').addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    var dist=touchDistance(e.touches[0],e.touches[1]);
    if(lightboxState.pinchStartDist>0){
      lightboxState.scale=clamp(lightboxState.pinchStartScale*(dist/lightboxState.pinchStartDist),1,5);
      updateLightboxTransform();
    }
  } else if(e.touches.length===1 && lightboxState.dragging){
    e.preventDefault();
    var t=e.touches[0];
    lightboxState.x += t.clientX-lightboxState.lastX;
    lightboxState.y += t.clientY-lightboxState.lastY;
    lightboxState.lastX=t.clientX; lightboxState.lastY=t.clientY;
    updateLightboxTransform();
  }
},{passive:false});
document.getElementById('lightboxViewport').addEventListener('touchend',function(){
  lightboxState.dragging=false;
  lightboxState.pinchStartDist=0;
});
window.addEventListener('keydown',function(e){
  var lb=document.getElementById('lightbox');
  if(!lb||!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  else if(e.key==='+'||e.key==='=') zoomLightbox(.35);
  else if(e.key==='-'||e.key==='_') zoomLightbox(-.35);
  else if(e.key==='0') resetLightboxZoom();
});

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function scrollToBottom(){ var w=document.getElementById('messagesWrap'); setTimeout(function(){ w.scrollTop=w.scrollHeight; },60); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function updateSendBtn(){
  if(isSending)return;
  var hasText=document.getElementById('chatInput').value.trim().length>0;
  var hasFiles=pendingFiles.some(function(f){ return f!=null; });
  var btn=document.getElementById('sendBtn');
  if(btn) btn.disabled=!(hasText||hasFiles);
}
function formatTime(d){ return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function escHtml(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function linkify(text){ return text.replace(/(https?:\/\/[^\s<>"]+)/g,'<a target="_blank" rel="nofollow" href="$1">$1</a>'); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||''); t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },3500); }

/* keyboard on mobile — scroll chat up when keyboard opens */
if ('visualViewport' in window) {
  window.visualViewport.addEventListener('resize', function(){
    var bottom = document.getElementById('chatBottom');
    if (!bottom || bottom.style.display==='none') return;
    scrollToBottom();
  });
}


/* Keep the mobile sidebar/divider ending exactly at the top of chat bottom or sign-in bar */
function updateMobileBottomSpace(){
  try{
    var visibleBottom = null;
    var chatBottom = document.getElementById('chatBottom');
    var signIn = document.getElementById('signinOverlay');
    if (chatBottom && getComputedStyle(chatBottom).display !== 'none') visibleBottom = chatBottom;
    else if (signIn && getComputedStyle(signIn).display !== 'none') visibleBottom = signIn;
    var h = visibleBottom ? Math.ceil(visibleBottom.getBoundingClientRect().height) : 0;
    document.documentElement.style.setProperty('--chat-bottom-space', Math.max(h, 0) + 'px');
  } catch(e) {}
}
window.addEventListener('resize', updateMobileBottomSpace);
window.addEventListener('orientationchange', function(){ setTimeout(updateMobileBottomSpace, 250); });
setInterval(updateMobileBottomSpace, 700);
setTimeout(updateMobileBottomSpace, 50);
setTimeout(updateMobileBottomSpace, 500);
