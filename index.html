/* Keep the mobile sidebar/divider ending exactly at the top of chat bottom or sign-in bar */
function updateMobileBottomSpace(){
  try{
    var visibleBottom = null;
    var chatBottom = document.getElementById('chatBottom');
    var signIn = document.getElementById('signinOverlay');
    if (chatBottom && getComputedStyle(chatBottom).display !== 'none') visibleBottom = chatBottom;
    else if (signIn && getComputedStyle(signIn).display !== 'none') visibleBottom = signIn;
    var h = visibleBottom ? Math.ceil(visibleBottom.getBoundingClientRect().height) : 0;
    document.documentElement.style.setProperty('--chat-bottom-space', Math.max(h, 0) + 'px');
  } catch(e) {}
}
window.addEventListener('resize', updateMobileBottomSpace);
window.addEventListener('orientationchange', function(){ setTimeout(updateMobileBottomSpace, 250); });
setInterval(updateMobileBottomSpace, 700);
setTimeout(updateMobileBottomSpace, 50);
setTimeout(updateMobileBottomSpace, 500);

</script>

    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw)).then(function(buf){
      var id = 'dev_' + Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(36); }).join('').substr(0,18);
      localStorage.setItem('__chatDeviceId', id);

    var id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).substr(2,6);

function postToAppsScriptWithProgress(payload, idx, total) {

    method:'POST',
    body:JSON.stringify(payload),
    redirect:'follow'

            var driveUrl = fileId ? ('https://drive.google.com/file/d/' + fileId + '/view') : (json.driveUrl || json.url || '');
            var thumbnailUrl = fileId ? ('https://drive.google.com/thumbnail?id=' + encodeURIComponent(fileId) + '&sz=w1200') : (json.thumbnailUrl || '');
            resolve({
              uploadedToDrive: true,
              driveStatus: 'uploaded',
              driveFileId: fileId,
              fileId: fileId,
              driveUrl: driveUrl,
              driveServeUrl: serveUrl,
              driveProxyUrl: serveUrl,
              driveThumbnailUrl: thumbnailUrl,
              driveUploadedAt: Date.now()
            });
          })
          .catch(function(err){ reject(err); });
        }catch(err){ reject(err); }
      };
      reader.onerror = function(){ reject(new Error('تعذر قراءة الملف لإرساله إلى Google Drive')); };
      reader.readAsDataURL(prepared);
    }catch(e){ reject(e); }
  });
}

function mergeDriveAttachmentIntoMessage(docRef, index, driveData){
  if(!docRef || !driveData || !driveData.uploadedToDrive) return;
  docRef.get().then(function(snap){
    if(!snap.exists) return;
    var data = snap.data() || {};
    var atts = Array.isArray(data.attachments) ? data.attachments.slice() : [];
    if(!atts[index]) return;
    atts[index] = Object.assign({}, atts[index], driveData);
    return docRef.update({attachments: atts, hasDriveMirror: true, driveMirrorUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()});
  }).catch(function(e){
    console.warn('Drive mirror metadata update failed:', e);
  });
}

function attachDriveMirrorUpdates(docRef, uploadResult){
  if(!uploadResult || !Array.isArray(uploadResult.driveJobs)) return;
  uploadResult.driveJobs.forEach(function(job){
    if(!job || !job.promise) return;
    job.promise.then(function(driveData){
      mergeDriveAttachmentIntoMessage(docRef, job.index, driveData);
    }).catch(function(err){
      console.warn('Google Drive mirror upload failed:', err);
    });
  });
}

function uploadFilesSequentially(files){
  var results=[], failures=[], driveJobs=[];
  function next(i){
    if(i>=files.length){
      if(failures.length && !results.length){
        var first=failures[0] && failures[0].error ? failures[0].error.message : 'فشل الرفع';
        return Promise.reject(new Error(first));
      }
      if(failures.length){
        showToast('تم رفع '+results.length+' وفشل '+failures.length+' ملف. تحقق من الملفات الكبيرة أو غير المحملة من iCloud.', 'error');
      }
      return Promise.resolve({attachments: results, driveJobs: driveJobs});
    }

    // Uploadcare is the primary fast display source. Google Drive starts at the same time as a parallel backup/mirror.
    var targetIndex = results.length;
    var drivePromise = uploadToDriveMirror(files[i], i, files.length);
    driveJobs.push({index: targetIndex, promise: drivePromise});

    return uploadToUploadcare(files[i], i, files.length).then(function(att){
      att.uploadedToDrive = false;
      att.driveStatus = 'uploading';
      att.driveMirror = true;
      results.push(att);
    }).catch(function(err){
      console.error('Uploadcare upload failed for file', files[i] && files[i].name, err);
      failures.push({file:files[i], error:err});
      // Drive may still finish, but no message is created unless the primary Uploadcare upload succeeds.
    }).then(function(){return next(i+1);});
  }
  return next(0);
}

function sendMessage(){
  if (!isSignedIn||isSending) return;
  var text  = normalizeEmojiPresentation(document.getElementById('chatInput').value.trim());
  var files = pendingFiles.filter(function(f){ return f!=null; });
  if (!text&&!files.length) return;
  if (files.length>0&&!userConsented){ showToast('لم توافق على مشاركة الملفات','error'); return; }

  isSending = true;
  var btn = document.getElementById('sendBtn');
  if (btn) btn.disabled=true;

  var savedText=text, savedFiles=files.slice();
  document.getElementById('chatInput').value='';
  autoResize(document.getElementById('chatInput'));
  clearUploadPreview(); stopTyping(); updateSendBtn();

  if (!savedFiles.length){ saveMsg(savedText,[]).finally(finishSend); return; }

  showUploadProgress(savedFiles.length);
  uploadFilesSequentially(savedFiles)
    .then(function(uploadResult){
      setProgressPct(100,savedFiles.length,savedFiles.length);
      return saveMsg(savedText, uploadResult.attachments).then(function(docRef){
        attachDriveMirrorUpdates(docRef, uploadResult);
        return docRef;
      });
    })
    .then(function(){ hideUploadProgress(); })
    .catch(function(e){ hideUploadProgress(); showToast(e&&e.message==='script/not-configured'?'⚠️ ضع رابط Apps Script أولاً':'فشل الرفع: '+((e&&e.message)||''),'error'); })
    .finally(finishSend);

  function finishSend(){
    isSending=false;
    hideUploadProgress();
    if (btn) btn.disabled=false;
    updateSendBtn();
  }
}

function saveMsg(text,attachments){
  var replySnapshot = pendingReply ? Object.assign({}, pendingReply) : null;
  var payload = {
    text:text, attachments:attachments,
    name:currentUser.name, type:'Guest', deviceId:currentUser.deviceId,
    timestamp:firebase.firestore.FieldValue.serverTimestamp(), edited:false
  };
  if(replySnapshot) payload.replyTo = replySnapshot;
  return db.collection('rooms').doc(ROOM_ID).collection('messages').add(payload).then(function(ref){
    if(replySnapshot) clearReplyTarget();
    return ref;
  }).catch(function(e){
    console.error('Save message failed:', e);
    showToast('فشل حفظ الرسالة: '+(e&&e.message?e.message:''),'error');
    throw e;
  });
}

var GIF_SYNONYMS={
  'ضحك':'laugh','اضحك':'laugh','هههه':'laugh','ههههه':'laugh','نكتة':'laugh',
  'تمام':'ok','اوكي':'ok','اوك':'ok','زين':'ok','جيد':'ok','موافق':'yes',
  'اي':'yes','ايه':'yes','نعم':'yes','صح':'yes','صحيح':'yes',
  'لا':'no','كلا':'no','مو':'no',
  'حزين':'sad','زعلان':'sad','زعل':'sad','ابكي':'sad','بكاء':'sad','دموع':'sad',
  'حب':'love','احبك':'love','قلب':'love','قلوب':'love',

function normalizeGifQuery(q){
  q=String(q||'').toLowerCase().trim();
  q=q.replace(/[أإآ]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/[ًٌٍَُِّْـ]/g,'');
  q=q.replace(/[^\w\u0600-\u06ff\s]+/g,' ').replace(/\s+/g,' ').trim();
  var parts=q.split(' ').filter(Boolean);
  var extra=[];
  parts.forEach(function(w){ if(GIF_SYNONYMS[w]) extra.push(GIF_SYNONYMS[w]); });
  return (q+' '+extra.join(' ')).trim();
}
function openGifPicker(){var ov=document.getElementById('gifPickerOverlay');if(!ov)return;ov.classList.add('show');var inp=document.getElementById('gifSearchInput');if(inp){inp.value='';setTimeout(function(){inp.focus();},80);}renderGifGrid(BUILTIN_GIFS,'');}
function closeGifPicker(){var ov=document.getElementById('gifPickerOverlay');if(ov)ov.classList.remove('show');}
function renderGifGrid(items,notice){
  var grid=document.getElementById('gifGrid');if(!grid)return;
  var note=document.getElementById('gifPickerNote');
  if(note && notice) note.textContent=notice;
  else if(note) note.textContent='اكتب كلمة مثل: ضحك، حب، حزين، تمام، لا، شكر، صدمة، قهوة. إذا لم توجد مطابقة دقيقة ستظهر اقتراحات شائعة بدل رسالة لا توجد نتائج.';
  if(!items||!items.length){items=BUILTIN_GIFS.slice(0,12); if(note) note.textContent='لم أجد مطابقة دقيقة، فهذه اقتراحات شائعة.';}
  grid.innerHTML=items.map(function(g){return '<button type="button" class="gif-card" onclick="sendGifFromLibrary(\''+escJs(g.url)+'\',\''+escJs(g.title||'GIF')+'\')"><img src="'+escHtml(g.url)+'" alt="'+escHtml(g.title||'GIF')+'" loading="lazy"></button>';}).join('');
}
function searchBuiltinGifs(q){
  var nq=normalizeGifQuery(q);
  if(!nq)return BUILTIN_GIFS;
  var tokens=nq.split(' ').filter(Boolean);
  var scored=BUILTIN_GIFS.map(function(g){
    var hay=normalizeGifQuery((g.title||'')+' '+(g.keywords||''));
    var score=0;
    tokens.forEach(function(t){ if(hay.indexOf(t)!==-1) score+=2; });
    if(hay.indexOf(nq)!==-1) score+=5;
    return {g:g,score:score};
  }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;}).map(function(x){return x.g;});
  return scored.length?scored:BUILTIN_GIFS.slice(0,12);
}
function searchGiphy(q){
  q=String(q||'').trim();
  if(!GIPHY_API_KEY){
    var local=searchBuiltinGifs(q);
    var notice=q?'نتائج من المكتبة الداخلية. للبحث في الإنترنت أضف GIPHY_API_KEY داخل الكود.':'';
    renderGifGrid(local,notice);return;
  }
  var grid=document.getElementById('gifGrid');if(grid)grid.innerHTML='<div class="gif-empty">جاري البحث...</div>';
  fetch('https://api.giphy.com/v1/gifs/search?api_key='+encodeURIComponent(GIPHY_API_KEY)+'&q='+encodeURIComponent(q||'reaction')+'&limit=24&rating=pg&bundle=messaging_non_clips').then(function(r){return r.json();}).then(function(json){var items=(json.data||[]).map(function(x){var img=(x.images&&x.images.fixed_height_small)||x.images.downsized_medium||x.images.original||{};return{title:x.title||'GIF',url:img.url};}).filter(function(x){return x.url;});renderGifGrid(items.length?items:searchBuiltinGifs(q),items.length?'':'لم تصل نتائج من GIPHY، فهذه اقتراحات من المكتبة الداخلية.');}).catch(function(){renderGifGrid(searchBuiltinGifs(q),'تعذر الاتصال بـ GIPHY، فهذه اقتراحات من المكتبة الداخلية.');});
}
var gifSearchTimer=null;setTimeout(function(){var inp=document.getElementById('gifSearchInput');if(inp)inp.addEventListener('input',function(){clearTimeout(gifSearchTimer);var q=this.value;gifSearchTimer=setTimeout(function(){searchGiphy(q);},220);});},0);
function sendGifFromLibrary(url,title){closeGifPicker();var attachment={provider:'gif-library',type:'image',mime:'image/gif',url:url,cdnUrl:url,directUrl:url,fullUrl:url,name:title||'GIF',size:0,displaySource:'gif'};saveMsg('',[attachment]).then(function(){scrollToBottom();}).catch(function(){showToast('فشل إرسال GIF','error');});}
function escJs(str){return String(str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}

function addFilePreview(file){
  pendingFiles.push(file);
  var idx=pendingFiles.length-1;
  var bar=document.getElementById('uploadPreviewBar');
  bar.style.display='flex';
  var item=document.createElement('div');item.className='preview-item';
  var name=safeClientFileName(file, idx);
  var mime=file.type||inferMimeFromName(name,'');
  var ext=getExtFromName(name);
  var canPreviewImage = mime.indexOf('image/')===0 && !/^(heic|heif|tif|tiff|svg|avif)$/i.test(ext) && (file.size||0) < 12*1024*1024;
  if(canPreviewImage){
    var reader=new FileReader();
    reader.onload=function(e){item.innerHTML='<img class="preview-thumb" src="'+e.target.result+'"/><button class="preview-remove" onclick="removePreview('+idx+',this.parentNode)">✕</button>';};
    reader.onerror=function(){item.innerHTML='<div class="preview-file-chip">'+getFileIcon(name,mime)+' '+escHtml(name)+'</div><button class="preview-remove" onclick="removePreview('+idx+',this.parentNode)">✕</button>';};
    reader.readAsDataURL(file);
  }else{
    item.innerHTML='<div class="preview-file-chip">'+getFileIcon(name,mime)+' '+escHtml(name)+'</div><button class="preview-remove" onclick="removePreview('+idx+',this.parentNode)">✕</button>';
  }
  bar.appendChild(item);updateSendBtn();
}
function removePreview(idx,el){
  pendingFiles[idx]=null;el.remove();
  if(!document.getElementById('uploadPreviewBar').children.length)document.getElementById('uploadPreviewBar').style.display='none';
  updateSendBtn();
}
function clearUploadPreview(){pendingFiles=[];var bar=document.getElementById('uploadPreviewBar');bar.innerHTML='';bar.style.display='none';}

function registerAnonymousPresence(){
  getDeviceId().then(function(devId){
    var ref=rtdb.ref('presence/'+ROOM_ID+'/'+devId);
    ref.set({name:null,isViewer:true,online:true,ts:Date.now()});
    ref.onDisconnect().remove(); listenPresence();
  });
}
function registerNamedPresence(name,devId){
  var ref=rtdb.ref('presence/'+ROOM_ID+'/'+devId);
  ref.set({name:name,isViewer:false,online:true,ts:Date.now()});
  ref.onDisconnect().remove(); listenPresence();
}
function listenPresence(){
  rtdb.ref('presence/'+ROOM_ID).on('value',function(snap){ renderPresence(snap.val()||{}); });
}
function renderPresence(all){
  var entries=Object.values(all||{});
  var count=entries.length;
  var viewerCount=entries.filter(function(p){ return !p.name && p.isViewer; }).length;
  var namedEntries=entries.filter(function(p){ return p.name; });
  var anonymousEntries=entries.filter(function(p){ return !p.name && !p.isViewer; });
  var onlineEl = document.getElementById('onlineCountEl');
  if (onlineEl) onlineEl.textContent=count+' online';
  var mobileEl = document.getElementById('mobileOnlineCount');
  if (mobileEl) mobileEl.textContent=count;
  var list=document.getElementById('presenceList');
  if (!list) return;
  list.innerHTML='';
  function addContact(label, extraClass){
    var el=document.createElement('div');
    el.className='contact-list-item presence-item '+(extraClass||'');
    el.innerHTML='<div class="contact-list-profile-image profile-tiny-image presence-avatar" style="background-image:url(\''+DEFAULT_AVATAR+'\')"></div>'+ '<div class="contact-list-profile-name presence-name '+(extraClass||'')+'">'+escHtml(label)+'</div>'+ '<div class="contact-list-status-icon status-icon status-icon-1 presence-dot" title="Online"></div>';
    list.appendChild(el);
  }
  namedEntries.forEach(function(p){ addContact(p.name, ''); });
  if(viewerCount>0) addContact(viewerCount+' Viewer','viewer-count');
  anonymousEntries.forEach(function(){ addContact('anonymous','contact-list-item-inactive anon'); });
}

function handleTyping(){
  if(!isSignedIn||!currentUser)return;
  var ref=rtdb.ref('typing/'+ROOM_ID+'/'+currentUser.deviceId);
  ref.set({name:currentUser.name,ts:Date.now()}); ref.onDisconnect().remove();

function stopTyping(){
  if(!isSignedIn||!currentUser)return;

rtdb.ref('typing/'+ROOM_ID).on('value',function(snap){
  var all=snap.val()||{}, devId=currentUser?currentUser.deviceId:null;
  var others=Object.entries(all)
    .filter(function(e){ return e[0]!==devId; })
    .map(function(e){ return e[1] && e[1].name ? e[1].name : ''; })
    .filter(Boolean);

  var bar = document.getElementById('typingBar');

    bar.innerHTML = '';

  }

  var namesHtml = others.map(function(name){
    return '<span class="typing-name">' + escHtml(name) + '</span>';
  }).join('<span class="typing-separator">، </span>');

  bar.innerHTML = namesHtml + ' <span class="typing-status-word">يكتب...</span>';
});

/* ═══════════════════════════════════════════════
   LIGHTBOX + IMAGE ZOOM / PAN / PINCH
═══════════════════════════════════════════════ */
var lightboxState = { scale:1, x:0, y:0, dragging:false, lastX:0, lastY:0, pinchStartDist:0, pinchStartScale:1 };
function clamp(n,min,max){ return Math.min(Math.max(n,min),max); }
function updateLightboxTransform(){
  var img=document.getElementById('lightboxImg');
  var level=document.getElementById('lightboxZoomLevel');
  if(!img) return;
  lightboxState.scale=clamp(lightboxState.scale,1,5);
  if(lightboxState.scale<=1.001){ lightboxState.scale=1; lightboxState.x=0; lightboxState.y=0; }
  img.style.transform='translate3d('+lightboxState.x+'px,'+lightboxState.y+'px,0) scale('+lightboxState.scale+')';
  if(level) level.textContent=Math.round(lightboxState.scale*100)+'%';
}
function resetLightboxZoom(){
  lightboxState.scale=1; lightboxState.x=0; lightboxState.y=0;
  updateLightboxTransform();
}
function zoomLightbox(delta, cx, cy){
  var oldScale=lightboxState.scale;
  var nextScale=clamp(oldScale+delta,1,5);
  if(nextScale===oldScale) return;
  // Approximate zoom toward pointer/center for a natural feel
  if(cx!=null && cy!=null){
    var vw=window.innerWidth/2, vh=window.innerHeight/2;
    lightboxState.x -= (cx-vw) * (nextScale-oldScale) / Math.max(nextScale,1);
    lightboxState.y -= (cy-vh) * (nextScale-oldScale) / Math.max(nextScale,1);
  }
  lightboxState.scale=nextScale;
  updateLightboxTransform();
}
function closeLightbox(){
  var lb=document.getElementById('lightbox');
  var img=document.getElementById('lightboxImg');
  if(lb) lb.classList.remove('open');
  if(img) img.src='';
  resetLightboxZoom();
}
function openLightbox(url){
  resetLightboxZoom();
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxZoomIn').addEventListener('click',function(){ zoomLightbox(.35); });
document.getElementById('lightboxZoomOut').addEventListener('click',function(){ zoomLightbox(-.35); });
document.getElementById('lightboxZoomReset').addEventListener('click', resetLightboxZoom);
document.getElementById('lightbox').addEventListener('click',function(e){
  if(e.target===this){ closeLightbox(); }
});
document.getElementById('lightboxViewport').addEventListener('wheel',function(e){
  e.preventDefault();
  zoomLightbox(e.deltaY<0?.25:-.25,e.clientX,e.clientY);
},{passive:false});
document.getElementById('lightboxViewport').addEventListener('mousedown',function(e){
  if(lightboxState.scale<=1) return;
  lightboxState.dragging=true; lightboxState.lastX=e.clientX; lightboxState.lastY=e.clientY;
  this.classList.add('dragging');
});
window.addEventListener('mousemove',function(e){
  if(!lightboxState.dragging) return;
  lightboxState.x += e.clientX-lightboxState.lastX;
  lightboxState.y += e.clientY-lightboxState.lastY;
  lightboxState.lastX=e.clientX; lightboxState.lastY=e.clientY;
  updateLightboxTransform();
});
window.addEventListener('mouseup',function(){
  lightboxState.dragging=false;
  var vp=document.getElementById('lightboxViewport'); if(vp) vp.classList.remove('dragging');
});
function touchDistance(t1,t2){ var dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY; return Math.sqrt(dx*dx+dy*dy); }
document.getElementById('lightboxViewport').addEventListener('touchstart',function(e){
  if(e.touches.length===1){
    lightboxState.dragging=lightboxState.scale>1;
    lightboxState.lastX=e.touches[0].clientX; lightboxState.lastY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    lightboxState.dragging=false;
    lightboxState.pinchStartDist=touchDistance(e.touches[0],e.touches[1]);
    lightboxState.pinchStartScale=lightboxState.scale;
  }
},{passive:false});
document.getElementById('lightboxViewport').addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    var dist=touchDistance(e.touches[0],e.touches[1]);
    if(lightboxState.pinchStartDist>0){
      lightboxState.scale=clamp(lightboxState.pinchStartScale*(dist/lightboxState.pinchStartDist),1,5);
      updateLightboxTransform();
    }
  } else if(e.touches.length===1 && lightboxState.dragging){
    e.preventDefault();
    var t=e.touches[0];
    lightboxState.x += t.clientX-lightboxState.lastX;
    lightboxState.y += t.clientY-lightboxState.lastY;
    lightboxState.lastX=t.clientX; lightboxState.lastY=t.clientY;
    updateLightboxTransform();
  }
},{passive:false});
document.getElementById('lightboxViewport').addEventListener('touchend',function(){
  lightboxState.dragging=false;
  lightboxState.pinchStartDist=0;
});
window.addEventListener('keydown',function(e){
  var lb=document.getElementById('lightbox');
  if(!lb||!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  else if(e.key==='+'||e.key==='=') zoomLightbox(.35);
  else if(e.key==='-'||e.key==='_') zoomLightbox(-.35);
  else if(e.key==='0') resetLightboxZoom();
});

function initPlyrIn(root){
  if(!root)return;
  if(!window.Plyr){
    setTimeout(function(){initPlyrIn(root);},300);
    return;
  }
  var nodes=root.querySelectorAll?root.querySelectorAll('video.plyr-video:not([data-plyr-ready])'):[];
  nodes.forEach(function(v){
    try{
      v.setAttribute('data-plyr-ready','1');
      new Plyr(v,{
        controls:['play-large','play','progress','current-time','duration','mute','volume','settings','fullscreen'],
        settings:['speed'],
        fullscreen:{enabled:true,iosNative:true},
        clickToPlay:true,
        keyboard:{focused:true,global:false},
        tooltips:{controls:false,seek:true},
        hideControls:true
      });
    }catch(e){ try{console.warn('Plyr init failed', e);}catch(_){} }
  });
}

function escHtml(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function linkify(text){ return text.replace(/(https?:\/\/[^\s<>"]+)/g,'<a target="_blank" rel="nofollow" href="$1">$1</a>'); }

/* Keep the mobile sidebar/divider ending exactly at the top of chat bottom or sign-in bar */
function updateMobileBottomSpace(){
  try{
    var visibleBottom = null;
    var chatBottom = document.getElementById('chatBottom');
    var signIn = document.getElementById('signinOverlay');
    if (chatBottom && getComputedStyle(chatBottom).display !== 'none') visibleBottom = chatBottom;
    else if (signIn && getComputedStyle(signIn).display !== 'none') visibleBottom = signIn;
    var h = visibleBottom ? Math.ceil(visibleBottom.getBoundingClientRect().height) : 0;
    document.documentElement.style.setProperty('--chat-bottom-space', Math.max(h, 0) + 'px');
  } catch(e) {}
}

window.addEventListener('orientationchange', function(){ setTimeout(updateMobileBottomSpace, 250); });
setInterval(updateMobileBottomSpace, 700);
